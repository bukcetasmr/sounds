<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BUCKET ASMR | INFINITE LOOP</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
    font-family: Arial, sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  .container { position: relative; z-index: 10; display:flex; flex-direction: column; align-items:center; padding:20px; height: 100vh; box-sizing: border-box; }
  .controls { margin-bottom:15px; display:flex; gap:10px; z-index: 10; }
  
  #randomBtn { 
    padding:10px 20px; border:none; border-radius:12px; 
    background: rgba(138, 43, 226, 0.5); color:white; cursor:pointer; 
    font-weight:bold; backdrop-filter: blur(5px); min-width: 120px;
    border: 1px solid rgba(138, 43, 226, 0.3);
  }
  #randomBtn.active { background: #ffb400; color: black; }

  .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 15px; width: 100%; max-width: 600px; }
  .sound-button { 
    aspect-ratio: 1; border-radius: 20px; background: rgba(255,255,255,0.1); 
    border: 1px solid rgba(255,255,255,0.05); color:white; cursor:pointer;
    display:flex; flex-direction: column; justify-content:center; align-items:center;
    transition: 0.3s; position: relative; overflow: hidden; font-size: 12px;
  }
  .sound-button.active { border-color: #ffb400; box-shadow: 0 0 15px rgba(255, 180, 0, 0.2); }
  
  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
  .speed-select { padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; color: white; border: none; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>

<div class="container">
  <h1 style="color:#ffb400; text-shadow: 0 0 10px #ffb400;">BUCKET ASMR</h1>
  
  <div class="controls">
    <button id="randomBtn">PLAY</button>
    <select id="speedTrigger" class="speed-select">
      <option value="10">10s</option>
      <option value="30">30s</option>
      <option value="60">1m</option>
    </select>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null;
let randomActive = false, audioElements = [], particles = [];
let randomTimer = null;

const sounds = [
  {file:'purplebrush.mp3', name:'Brush', color:'rgba(150,100,255,0.5)'},
  {file:'choko.mp3', name:'Choco', color:'rgba(139,69,19,0.5)'},
  {file:'strawberry.mp3', name:'Strawberry', color:'rgba(255,105,180,0.5)'},
  {file:'wax.mp3', name:'Wax', color:'rgba(255,165,0,0.5)'},
  {file:'woodandrocks.mp3', name:'Wood', color:'rgba(255,255,0,0.5)'}
];

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.size = Math.random() * 3 + 1;
    this.speedX = Math.random() * 4 - 2;
    this.speedY = Math.random() * -4 - 1;
    this.color = color;
    this.alpha = 1;
  }
  update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.02; }
  draw(ctx) {
    ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
  }
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.connect(audioCtx.destination);
}

const grid = document.getElementById('soundGrid');
sounds.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<span>${s.name}</span>`;
  grid.appendChild(btn);

  const audio = new Audio(`https://raw.githubusercontent.com/bucketasmr/sounds/main/${s.file}`);
  audio.loop = true; audio.crossOrigin = "anonymous";

  const state = { audio, btn, color: s.color, analyser: null, gainNode: null, targetVol: 0 };
  btn.onclick = () => { initAudio(); state.targetVol === 0 ? fadeIn(state) : fadeOut(state); };
  audioElements.push(state);
});

function fadeIn(el) {
  el.audio.play().then(() => {
    if (!el.gainNode) {
      const src = audioCtx.createMediaElementSource(el.audio);
      el.gainNode = audioCtx.createGain();
      el.analyser = audioCtx.createAnalyser();
      src.connect(el.gainNode);
      el.gainNode.connect(el.analyser);
      el.analyser.connect(globalAnalyser);
    }
    el.btn.classList.add('active');
    el.targetVol = 0.6;
    el.gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.5);
  });
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  el.targetVol = 0;
  if (el.gainNode) el.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
  setTimeout(() => { if(el.targetVol === 0) el.audio.pause(); }, 1000);
}

// ОСНОВНОЙ ЦИКЛ РАНДОМАЙЗЕРА
function runRandomCycle() {
  if (!randomActive) return;

  // Ищем те, что загрузились
  let ready = audioElements.filter(el => el.audio.readyState >= 2);
  
  if (ready.length > 0) {
    // Решаем: оставить один звук или смешать два (50/50 шанс)
    let count = Math.random() > 0.5 ? 2 : 1;
    if (ready.length < 2) count = 1;

    let shuffled = [...ready].sort(() => 0.5 - Math.random());
    let nextSounds = shuffled.slice(0, count);

    // Гасим всё, чего нет в новом списке
    audioElements.forEach(el => {
      if (!nextSounds.includes(el)) fadeOut(el);
    });

    // Плавно включаем выбранные
    nextSounds.forEach(el => fadeIn(el));

    // Визуальный отклик на кнопке
    const speed = parseInt(document.getElementById('speedTrigger').value);
    startCountdown(speed);

    randomTimer = setTimeout(runRandomCycle, speed * 1000);
  } else {
    // Если еще грузится — пробуем через секунду
    document.getElementById('randomBtn').innerText = "...";
    setTimeout(runRandomCycle, 1000);
  }
}

function startCountdown(s) {
  let left = s;
  const btn = document.getElementById('randomBtn');
  const tick = setInterval(() => {
    if (!randomActive) { clearInterval(tick); return; }
    btn.innerText = `STOP (${left}s)`;
    if (left-- <= 0) clearInterval(tick);
  }, 1000);
}

document.getElementById('randomBtn').onclick = function() {
  initAudio();
  randomActive = !randomActive;
  if (randomActive) {
    this.classList.add('active');
    runRandomCycle();
  } else {
    this.classList.remove('active');
    this.innerText = "PLAY";
    clearTimeout(randomTimer);
    audioElements.forEach(fadeOut);
  }
};

// Визуализация и частицы
const vCan = document.getElementById('vis'); const vCtx = vCan.getContext('2d');
const sCan = document.getElementById('stars'); const sCtx = sCan.getContext('2d');
function res() { vCan.width = sCan.width = innerWidth; vCan.height = sCan.height = innerHeight; }
window.onresize = res; res();

const stars = Array.from({length: 80}, () => ({x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.5, s:Math.random()*0.02}));

function animate() {
  sCtx.clearRect(0,0,innerWidth,innerHeight);
  stars.forEach(s => {
    sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sCtx.fillStyle = `rgba(255,255,255,${0.2 + Math.abs(Math.sin(Date.now()*s.s))})`; sCtx.fill();
  });

  vCtx.clearRect(0,0,innerWidth,innerHeight);
  particles.forEach((p, i) => {
    p.update(); p.draw(vCtx);
    if(p.alpha <= 0) particles.splice(i, 1);
  });

  audioElements.forEach(el => {
    if (el.analyser && el.btn.classList.contains('active')) {
      const data = new Uint8Array(el.analyser.frequencyBinCount);
      el.analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b)/data.length;
      if (avg > 40) {
        const r = el.btn.getBoundingClientRect();
        particles.push(new Particle(r.left+r.width/2, r.top+r.height/2, el.color));
      }
      el.btn.style.background = el.color.replace('0.5', (0.1 + avg/255).toFixed(2));
    } else {
      el.btn.style.background = "";
    }
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
