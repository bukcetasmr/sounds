<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR | STABLE EDITION</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
    font-family: Arial, sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  
  .container { 
    position: relative; z-index: 10; 
    display:flex; flex-direction: column; align-items:center; 
    padding:20px; height: 100vh; box-sizing: border-box; 
  }

  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:26px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  #helpBtn {
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
    width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
  }

  #langBtn {
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 8px 16px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold;
  }

  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { 
    padding:8px 14px; border:none; border-radius:12px; 
    background: rgba(255,255,255,0.2); color:white; cursor:pointer; 
    font-weight:bold; backdrop-filter: blur(5px); font-size: 13px;
  }
  #randomBtn { background: rgba(138, 43, 226, 0.4); border: 1px solid rgba(138, 43, 226, 0.5); min-width: 80px; }
  #repairBtn { background: rgba(255, 50, 50, 0.3); border: 1px solid rgba(255, 50, 50, 0.5); color: #ffcccc; }

  .sound-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
    gap: 15px; width: 100%; max-width: 600px; padding: 10px; overflow-y: auto; flex-grow: 1; z-index: 5;
  }

  .sound-button { 
    aspect-ratio: 1 / 1; border: none; border-radius: 20px; 
    background: rgba(255,255,255,0.05); color:rgba(255,255,255,0.2); font-weight:bold; 
    cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; 
    backdrop-filter: blur(8px); transition: 0.3s; font-size: 11px; text-align: center;
    border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
    padding: 5px;
  }

  .sound-button.loading { animation: pulse-load 1.2s infinite; color: #ffb400; }
  .sound-button.ready { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.1); }
  .sound-button.active { box-shadow: 0 0 20px rgba(255,255,255,0.2); color: white; }
  .sound-button.broken { border: 2px solid rgba(255, 50, 50, 0.6) !important; color: #ff5050; }

  @keyframes pulse-load {
    0%, 100% { background: rgba(255, 180, 0, 0.05); }
    50% { background: rgba(255, 180, 0, 0.2); }
  }

  .tile-vis {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden; display: none;
  }
  .tile-vis-bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; }
  .sound-button.active .tile-vis { display: block; }

  .custom-select-container { position: relative; }
  .select-trigger {
    padding: 8px 14px; border-radius: 12px; background: rgba(255, 255, 255, 0.2);
    color: white; cursor: pointer; font-weight: bold; font-size: 13px; min-width: 80px; text-align: center;
  }
  .custom-dropdown {
    display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(30, 30, 45, 0.95); border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px; flex-direction: column; z-index: 3000; overflow: hidden; min-width: 120px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(15px);
  }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button { padding: 10px; border: none; background: transparent; color: white; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
  
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(8px);
  }
  .modal-content {
    background: rgba(20, 20, 35, 0.95); border: 1px solid #ffb400;
    padding: 30px; border-radius: 24px; text-align: center; color: white; max-width: 85%;
    box-shadow: 0 0 30px rgba(255, 180, 0, 0.2);
  }
  .modal-btn {
    background:#ffb400; border:none; padding:12px 30px; border-radius:12px; 
    font-weight:bold; cursor:pointer; color:black; font-size: 16px; margin-top: 10px;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>
<div class="overlay"></div>

<div id="welcomeModal" class="modal" style="display: flex;">
  <div class="modal-content">
    <h2 style="color: #ffb400; margin-top: 0;">BUCKET ASMR</h2>
    <p style="line-height: 1.6; font-size: 15px;">
      Звуки загружаются последовательно для стабильной работы.<br><br>
      Если кнопка <b>красная</b> или долго <b>мигает</b> — нажми на неё для повторной загрузки.
    </p>
    <button class="modal-btn" id="closeWelcome">Начать</button>
  </div>
</div>

<div class="container">
  <div class="title-bar" id="mainHeader">
    <h1 id="title">BUCKET ASMR</h1>
    <div id="helpBtn">?</div>
    <button id="langBtn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="repairBtn">REPAIR</button>
    <div class="custom-select-container">
        <div class="select-trigger" id="speedTrigger">10s</div>
        <div class="custom-dropdown" id="speedDropdown">
            <button onclick="setSpeed(10, '10s')">10s</button>
            <button onclick="setSpeed(30, '30s')">30s</button>
            <button onclick="setSpeed(60, '1m')">1m</button>
        </div>
    </div>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null;
let currentSpeedValue = 10, langIdx = 0, randomActive = false, nextCycleTimeout = null;
const langOrder = ['en', 'uk', 'ru'];
let audioElements = [], particles = [];

// Имена файлов проверены по твоему списку
const sounds = [
  {file:'purplebrush.mp3', name:{en:'Purple Brush', ru:'Фиолетовая кисть', uk:'Фіолетовий пензель'}, color:'rgba(150,100,255,0.5)'},
  {file:'choko.mp3', name:{en:'Choco', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.5)'},
  {file:'carrot.mp3', name:{en:'Carrot', ru:'Морковь', uk:'Морква'}, color:'rgba(255,140,0,0.5)'},
  {file:'oldphone.mp3', name:{en:'Old Phone', ru:'Старый телефон', uk:'Старий телефон'}, color:'rgba(50,50,50,0.5)'},
  {file:'greybrush.mp3', name:{en:'Grey Brush', ru:'Серая кисть', uk:'Сірий пензель'}, color:'rgba(140,140,140,0.5)'},
  {file:'pinksoftbrush.mp3', name:{en:'Soft Brush', ru:'Мягкая кисть', uk:'М’який пензель'}, color:'rgba(255,182,193,0.5)'},
  {file:'strawberry.mp3', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.5)'},
  {file:'wax.mp3', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.5)'},
  {file:'woodandrocks.mp3', name:{en:'Wood', ru:'Дерево', uk:'Дерево'}, color:'rgba(255,255,0,0.5)'}
];

const uiTL = {
  en: { code: "EN", title: "BUCKET ASMR", play: "Play", pause: "Pause", repair: "REPAIR" },
  ru: { code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", repair: "ЧИНИТЬ" },
  uk: { code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", repair: "ЛАГОДИТИ" }
};

async function smartLoad(state, file) {
    if (state.isLoaded) return;
    state.btn.classList.add('loading');
    state.btn.classList.remove('broken', 'ready');
    const url = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${file}?v=${Date.now()}`;
    
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error();
        const blob = await response.blob();
        const objectURL = URL.createObjectURL(blob);
        
        state.audio.src = objectURL;
        state.audio.load();
        
        return new Promise((resolve) => {
            state.audio.oncanplaythrough = () => {
                state.btn.classList.remove('loading', 'broken');
                state.btn.classList.add('ready');
                state.isLoaded = true;
                resolve(true);
            };
            setTimeout(() => resolve(false), 15000);
        });
    } catch (e) {
        state.btn.classList.remove('loading');
        state.btn.classList.add('broken');
        return false;
    }
}

async function startQueue() {
    for (let state of audioElements) {
        await smartLoad(state, state.fileName);
        await new Promise(r => setTimeout(r, 200)); 
    }
}

function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.fftSize = 64;
  globalAnalyser.connect(audioCtx.destination);
}

const grid = document.getElementById('soundGrid');
sounds.forEach((s) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<span>${s.name['en']}</span><div class="tile-vis"><div class="tile-vis-bar"></div></div>`;
  grid.appendChild(btn);

  const audio = new Audio();
  audio.loop = true; audio.crossOrigin = "anonymous";
  audio.setAttribute('playsinline', '');

  const state = { audio, btn, color: s.color, fileName: s.file, visBar: btn.querySelector('.tile-vis-bar'), targetVol: 0, source: null, isLoaded: false };

  btn.onclick = () => { 
    initAudioContext(); 
    if(!state.isLoaded) { smartLoad(state, state.fileName); return; }
    state.targetVol === 0 ? fadeIn(state) : fadeOut(state); 
  };
  audioElements.push(state);
});

startQueue();

function fadeIn(el) {
  if (!audioCtx) initAudioContext();
  el.audio.play().then(() => {
    if (!el.source) {
      el.source = audioCtx.createMediaElementSource(el.audio);
      el.gainNode = audioCtx.createGain();
      el.analyser = audioCtx.createAnalyser();
      el.analyser.fftSize = 32;
      el.tileDataArray = new Uint8Array(el.analyser.frequencyBinCount);
      el.source.connect(el.gainNode);
      el.gainNode.connect(el.analyser);
      el.analyser.connect(globalAnalyser);
    }
    el.btn.classList.add('active');
    el.targetVol = 0.6;
    el.gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.4);
  }).catch(() => {});
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  el.targetVol = 0;
  if(el.gainNode) el.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.8);
  setTimeout(() => { if(el.targetVol === 0) el.audio.pause(); }, 1000);
}

const sCan = document.getElementById('stars'); const sCtx = sCan.getContext('2d');
const vCan = document.getElementById('vis'); const vCtx = vCan.getContext('2d');
function res() { sCan.width = vCan.width = innerWidth; sCan.height = vCan.height = innerHeight; }
window.onresize = res; res();

const starsArr = Array.from({length:80}, () => ({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.5, a:Math.random(), t:Math.random()*0.01 }));

function animate(){
  sCtx.clearRect(0,0,innerWidth,innerHeight);
  starsArr.forEach(s=>{ s.a+=s.t; if(s.a>1||s.a<0.1) s.t*=-1; sCtx.beginPath(); sCtx.arc(s.x,s.y,s.r,0,Math.PI*2); sCtx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`; sCtx.fill(); });
  vCtx.clearRect(0,0,innerWidth,innerHeight);
  
  audioElements.forEach(el => {
    if(el.analyser && el.btn.classList.contains('active')) {
        el.analyser.getByteFrequencyData(el.tileDataArray);
        let vol = 0; for(let i=0; i<el.tileDataArray.length; i++) vol += el.tileDataArray[i];
        vol /= el.tileDataArray.length;
        el.visBar.style.width = `${Math.min(100, (vol/150)*100)}%`;
        el.btn.style.backgroundColor = el.color.replace('0.5', (0.15 + (vol/255)*0.6).toFixed(2));
        if(Math.random() < (0.05 + vol/255*0.4)){
          particles.push({ x: Math.random()*innerWidth, y: innerHeight+10, r: ((vol/50)+5)*2, s: (0.5 + (vol/100))/3, al: 0.9, c: el.color });
        }
    } else if(el.isLoaded) { 
        el.btn.style.backgroundColor = 'rgba(255,255,255,0.15)'; 
        el.visBar.style.width = '0%';
    }
  });

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.y -= p.s; p.al -= 0.001;
    vCtx.beginPath(); vCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    vCtx.fillStyle = `${p.c.split(',').slice(0,3).join(',')},${p.al})`;
    vCtx.fill();
    if(p.al <= 0) particles.splice(i, 1);
  }
  requestAnimationFrame(animate);
}
animate();

function runRandom() { 
  if(!randomActive) return; 
  let readySounds = audioElements.filter(el => el.isLoaded);
  if (readySounds.length === 0) { nextCycleTimeout = setTimeout(runRandom, 2000); return; }
  let count = Math.min(readySounds.length, Math.floor(Math.random() * 2) + 1); 
  let toPlay = readySounds.sort(() => 0.5 - Math.random()).slice(0, count);
  audioElements.forEach(el => toPlay.includes(el) ? fadeIn(el) : fadeOut(el));
  nextCycleTimeout = setTimeout(runRandom, currentSpeedValue * 1000); 
}

function setSpeed(v, l) { currentSpeedValue=v; document.getElementById('speedTrigger').innerText=l; document.getElementById('speedDropdown').classList.remove('open'); if(randomActive){clearTimeout(nextCycleTimeout); runRandom();} }
document.getElementById('speedTrigger').onclick = (e) => { e.stopPropagation(); document.getElementById('speedDropdown').classList.toggle('open'); };
document.getElementById('langBtn').onclick = () => { langIdx = (langIdx + 1) % 3; updateUI(); };
document.getElementById('randomBtn').onclick = () => { initAudioContext(); randomActive = !randomActive; if(randomActive) runRandom(); else { clearTimeout(nextCycleTimeout); audioElements.forEach(fadeOut); } updateUI(); };
document.getElementById('repairBtn').onclick = () => location.reload();
document.getElementById('closeWelcome').onclick = () => { initAudioContext(); document.getElementById('welcomeModal').style.display='none'; };

function updateUI(){
  const t=uiTL[langOrder[langIdx]];
  document.getElementById('title').innerText=t.title;
  document.getElementById('langBtn').innerText=t.code;
  document.getElementById('randomBtn').innerText=randomActive?t.pause:t.play;
  document.getElementById('repairBtn').innerText=t.repair;
  audioElements.forEach((el,i)=>el.btn.querySelector('span').innerText=sounds[i].name[langOrder[langIdx]]);
}
window.onclick=()=>document.getElementById('speedDropdown').classList.remove('open');
updateUI();
</script>
</body>
</html>
