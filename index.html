<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR Premium</title>
<style>
  /* Стили экрана блокировки */
  #pass-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
    z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s;
  }
  #pass-screen.hidden { opacity: 0; visibility: hidden; }
  .lock-box {
    background: rgba(255, 255, 255, 0.05); border: 1px solid #ffb400;
    padding: 40px 30px; border-radius: 30px; backdrop-filter: blur(20px);
    text-align: center; box-shadow: 0 0 30px rgba(255, 180, 0, 0.2); width: 280px;
  }
  .lock-box h2 { color: #ffb400; margin-bottom: 20px; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
  #pass-input {
    width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 18px;
    margin-bottom: 15px; outline: none; box-sizing: border-box;
  }
  .pass-btn { background: #ffb400; color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
  .error-msg { color: #ff5050; font-size: 13px; margin-top: 10px; display: none; }

  /* Основные стили */
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #050505; transition: background 3s ease;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.fancy-bg { background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%); }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  .container { position: relative; z-index: 10; display:flex; flex-direction: column; align-items:center; padding:20px; height: 100vh; box-sizing: border-box; }
  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:24px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  .live-counter {
    background: rgba(255, 50, 50, 0.15); border: 1px solid rgba(255, 50, 50, 0.4);
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: #ff8080;
    display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 1px;
  }
  .live-dot { width: 6px; height: 6px; background: #ff3030; border-radius: 50%; box-shadow: 0 0 8px #ff3030; animation: blink 1.5s infinite; }
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

  #helpBtn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); font-weight: bold; font-size: 18px; }
  .lang-btn-ui { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); padding: 8px 16px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; min-width: 45px; }
  
  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { padding:8px 14px; border:none; border-radius:12px; background: rgba(255,255,255,0.2); color:white; cursor:pointer; font-weight:bold; backdrop-filter: blur(5px); font-size: 13px; transition: all 0.3s ease; }
  #randomBtn { background: rgba(138, 43, 226, 0.4); border: 1px solid rgba(138, 43, 226, 0.5); min-width: 80px; }
  #repairBtn { background: rgba(255, 50, 50, 0.3); border: 1px solid rgba(255, 50, 50, 0.5); color: #ffcccc; }
  #sleepBtn { background: rgba(100, 150, 255, 0.1); border: 1px solid rgba(100, 150, 255, 0.2); color: #aabbff; }
  #sleepBtn.active { background: rgba(40, 50, 100, 0.6); color: #ccddee; border-color: rgba(100, 150, 255, 0.4); box-shadow: 0 0 15px rgba(0,0,50,0.5); }
  
  .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 15px; width: 100%; max-width: 600px; padding: 10px; overflow-y: auto; flex-grow: 1; z-index: 5; }
  .sound-button { aspect-ratio: 1 / 1; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; background: rgba(255,255,255,0.05); color:rgba(255,255,255,0.2); font-weight:bold; cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; backdrop-filter: blur(8px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-size: 11px; text-align: center; position: relative; overflow: hidden; padding: 5px; }
  
  /* Эффект пульсации плитки */
  .pulse-ring {
    position: absolute; width: 100%; height: 100%; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    opacity: 0; transform: scale(0.5); pointer-events: none; z-index: 0;
  }
  .active .pulse-ring { animation: pulseAnim 3s infinite; }
  @keyframes pulseAnim { 0% { transform: scale(0.6); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: scale(1.3); opacity: 0; } }

  .mute-btn { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; color: white; z-index: 20; border: 1px solid rgba(255,255,255,0.2); }
  .sound-button.active .mute-btn { display: flex; }
  .mute-btn.muted { background: #ff5050; border-color: #ff5050; }
  .sound-button.ready { background: rgba(255,255,255,0.12); color: white; }
  .sound-button.active { transform: scale(1.03); color: white; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 0 20px rgba(255,180,0,0.15); }
  .sound-button.broken { border: 2px solid rgba(255, 50, 50, 0.6) !important; color: #ff5050; }
  .sound-button span { position: relative; z-index: 1; }

  .custom-select-container { position: relative; }
  .select-trigger { padding: 8px 14px; border-radius: 12px; background: rgba(255, 255, 255, 0.2); color: white; cursor: pointer; font-weight: bold; font-size: 13px; min-width: 90px; text-align: center; }
  .custom-dropdown { display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(30, 30, 45, 0.95); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; flex-direction: column; z-index: 3000; overflow: hidden; min-width: 120px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(15px); }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button { padding: 12px; border: none; background: transparent; color: white; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
  
  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; transition: opacity 1.5s ease; }
  canvas.hidden { opacity: 0; }

  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(12px); }
  .modal-content { background: linear-gradient(145deg, #141423, #0a0a0f); border: 1px solid #ffb400; padding: 25px; border-radius: 30px; text-align: left; color: white; max-width: 85%; width: 400px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 40px rgba(255, 180, 0, 0.2); position: relative; }
  .modal-btn { background:#ffb400; border:none; padding:14px; border-radius:15px; font-weight:bold; cursor:pointer; color:black; font-size: 15px; width: 100%; margin-top: 15px; }
  
  #bg-anchor { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
</style>
</head>
<body class="fancy-bg">

<audio id="bg-anchor" loop playsinline>
    <source src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3" type="audio/mpeg">
</audio>

<div id="pass-screen">
  <div class="lock-box">
    <h2>Access Code</h2>
    <input type="password" id="pass-input" placeholder="••••••••" autofocus>
    <button class="pass-btn" onclick="checkPass()">Enter Premium</button>
    <div id="error-msg" class="error-msg">Invalid access code</div>
  </div>
</div>

<canvas id="stars"></canvas>
<div class="overlay"></div>

<div id="welcomeModal" class="modal">
  <div class="modal-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="color: #ffb400; margin: 0; font-size: 20px;">BUCKET Premium</h2>
        <button class="lang-btn-ui lang-switcher-btn" style="scale: 0.8;">EN</button>
    </div>
    <div id="tab-features" class="help-section active">
        <ul class="help-list" id="featuresList" style="list-style: none; padding:0; font-size:13px; color:#ccc;"></ul>
    </div>
    <button class="modal-btn" id="closeWelcome">OK / START</button>
  </div>
</div>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <div class="live-counter">
      <div class="live-dot"></div>
      <span id="online-count">—</span> LIVE
    </div>
    <div id="helpBtn" onclick="showHelp()">?</div>
    <button id="langBtn" class="lang-btn-ui lang-switcher-btn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="sleepBtn">Sleep: OFF</button>
    <button id="repairBtn">REPAIR</button>
    <div class="custom-select-container">
        <div class="select-trigger" id="speedTrigger">Fast</div>
        <div class="custom-dropdown" id="speedDropdown">
            <button onclick="setSpeed(11, 'fast')">Fast</button>
            <button onclick="setSpeed(24, 'medium')">Medium</button>
            <button onclick="setSpeed(46, 'slow')">Slow</button>
        </div>
    </div>
  </div>
  <div id="soundGrid" class="sound-grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAhDzJnUnVFQRlojHZaWp00IgrPsfbmkKo",
  authDomain: "bucket-asmr-premium.firebaseapp.com",
  projectId: "bucket-asmr-premium",
  databaseURL: "https://bucket-asmr-premium-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const connectionsRef = db.ref('online_users');
let myConnectionRef = null;
let counterInterval = null;

async function fetchOnlineCount() {
    try {
        const snapshot = await connectionsRef.once('value');
        document.getElementById('online-count').innerText = snapshot.numChildren() || 1;
    } catch (e) {}
}

function toggleFirebaseNetwork(isActive) {
    if (isActive) {
        if (!myConnectionRef) {
            myConnectionRef = connectionsRef.push();
            myConnectionRef.onDisconnect().remove();
            myConnectionRef.set(true);
        }
        fetchOnlineCount();
        if (!counterInterval) counterInterval = setInterval(fetchOnlineCount, 60000); 
    } else {
        if (counterInterval) { clearInterval(counterInterval); counterInterval = null; }
        if (myConnectionRef) { myConnectionRef.remove(); myConnectionRef = null; }
        document.getElementById('online-count').innerText = "—";
    }
}
toggleFirebaseNetwork(true);

// --- PASSWORD ---
function checkPass() {
  const input = document.getElementById('pass-input').value;
  if (btoa(input) === 'YnVja2V0MjAyNg==') {
    document.getElementById('pass-screen').classList.add('hidden');
    document.getElementById('welcomeModal').style.display = 'flex';
    initMediaSession();
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = () => window.history.pushState(null, null, window.location.href);
  } else {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('pass-input').value = '';
  }
}
document.getElementById('pass-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPass(); });

// --- AUDIO LOGIC (Direct HTML5 Audio) ---
let audioElements = [], randomActive = false, sleepMode = false, currentSpeedValue = 11, langIdx = 0, nextCycleTimeout = null;
const langOrder = ['en', 'pt', 'uk', 'ru'];

const sounds = [
  { "file": "purplebrush.mp3", "name": { "en": "Purple Brush", "pt": "Pincel Roxo", "ru": "Фиолетовая кисть", "uk": "Фіолетовий пензель" }, "color": "#9664ff" },
  { "file": "greybrush.mp3", "name": { "en": "Grey Brush", "pt": "Pincel Cinza", "ru": "Серая кисть", "uk": "Сірий пензель" }, "color": "#8c8c8c" },
  { "file": "pinksoftbrush.mp3", "name": { "en": "Soft Brush", "pt": "Pincel Macio", "ru": "Мягкая кисть", "uk": "М’який пензель" }, "color": "#ffb6c1" },
  { "file": "strawberry.mp3", "name": { "en": "Strawberry", "pt": "Morango", "ru": "Клубника", "uk": "Полуниця" }, "color": "#ff69b4" },
  { "file": "wax.mp3", "name": { "en": "Wax", "pt": "Cera", "ru": "Воск", "uk": "Віск" }, "color": "#ffa500" },
  { "file": "carrot.mp3", "name": { "en": "Carrot", "pt": "Cenoura", "ru": "Морковь", "uk": "Морква" }, "color": "#ff8c00" },
  { "file": "choko.mp3", "name": { "en": "Choco", "pt": "Chocolate", "ru": "Шоколад", "uk": "Шоколад" }, "color": "#8b4513" },
  { "file": "wood.mp3", "name": { "en": "Wood", "pt": "Madeira", "ru": "Дерево", "uk": "Дерево" }, "color": "#ffff00" },
  { "file": "oldphone.mp3", "name": { "en": "Old Phone", "pt": "Telefone Antigo", "ru": "Телефон", "uk": "Телефон" }, "color": "#323232" }
];

const uiTL = {
  en: { code: "EN", title: "BUCKET ASMR", play: "Play", pause: "Pause", repair: "REPAIR", sleep: "Sleep", features: ["<span>✦</span> <b>iOS 18 Background:</b> Stable play when locked.", "<span>✦</span> <b>Mixer:</b> Layer multiple sounds.", "<span>✦</span> <b>Sleep Mode:</b> Pure darkness."], speeds: { slow: "Slow", medium: "Medium", fast: "Fast" } },
  pt: { code: "PT", title: "BALDE ASMR", play: "Tocar", pause: "Pausa", repair: "REPARAR", sleep: "Dormir", features: ["<span>✦</span> <b>iOS 18 Fundo:</b> Som estável bloqueado.", "<span>✦</span> <b>Mixer:</b> Vários sons ao mesmo tempo.", "<span>✦</span> <b>Modo Sono:</b> Escuridão total."], speeds: { slow: "Lento", medium: "Médio", fast: "Rápido" } },
  uk: { code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", repair: "ЛАГОДИТИ", sleep: "Сон", features: ["<span>✦</span> <b>Фоновий режим:</b> Стабільно на iOS 18.", "<span>✦</span> <b>Міксер:</b> Накладання багатьох звуків.", "<span>✦</span> <b>Режим Сну:</b> Повна темрява."], speeds: { slow: "Повільно", medium: "Середньо", fast: "Швидко" } },
  ru: { code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", repair: "ЧИНИТЬ", sleep: "Сон", features: ["<span>✦</span> <b>Фоновый режим:</b> Стабильно на iOS 18.", "<span>✦</span> <b>Микшер:</b> Запуск многих звуков.", "<span>✦</span> <b>Режим Сна:</b> Полная темнота."], speeds: { slow: "Медленно", medium: "Средне", fast: "Быстро" } }
};

function initMediaSession() {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: 'BUCKET ASMR Premium',
      artist: 'Deep Relaxation',
      artwork: [{ src: 'https://img.icons8.com/fluency/240/null/bucket.png', sizes: '240x240', type: 'image/png' }]
    });
    navigator.mediaSession.setActionHandler('play', () => {
        document.getElementById('bg-anchor').play();
        audioElements.forEach(el => { if(el.active) el.audio.play(); });
    });
    navigator.mediaSession.setActionHandler('pause', () => {
        audioElements.forEach(el => el.audio.pause());
    });
  }
}

const grid = document.getElementById('soundGrid');
sounds.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<div class="pulse-ring"></div><div class="mute-btn">🔊</div><span>${s.name['en']}</span>`;
  grid.appendChild(btn);

  const audio = new Audio();
  audio.loop = true;
  audio.crossOrigin = "anonymous";
  audio.setAttribute('playsinline', '');

  const state = { audio, btn, active: false, muted: false, loaded: false, color: s.color, fileName: s.file };

  btn.onclick = () => {
    document.getElementById('bg-anchor').play().catch(()=>{});
    if (!state.loaded) {
        state.audio.src = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${state.fileName}`;
        state.audio.load();
        state.loaded = true;
        btn.classList.add('ready');
    }
    state.active ? fadeOut(state) : fadeIn(state);
  };

  btn.querySelector('.mute-btn').onclick = (e) => {
    e.stopPropagation();
    state.muted = !state.muted;
    state.audio.volume = state.muted ? 0 : 0.6;
    btn.querySelector('.mute-btn').classList.toggle('muted', state.muted);
    btn.querySelector('.mute-btn').innerText = state.muted ? '🔇' : '🔊';
  };
  audioElements.push(state);
});

function fadeIn(el) {
  el.active = true;
  el.btn.classList.add('active');
  el.btn.style.backgroundColor = el.color + "44"; // 44 hex = ~25% прозрачности
  el.audio.volume = 0;
  el.audio.play().catch(()=>{});
  let v = 0;
  const interval = setInterval(() => {
    if (v < 0.6 && !el.muted) { v += 0.05; el.audio.volume = Math.min(v, 0.6); } 
    else { clearInterval(interval); }
  }, 50);
}

function fadeOut(el) {
  el.active = false;
  el.btn.classList.remove('active');
  el.btn.style.backgroundColor = "";
  let v = el.audio.volume;
  const interval = setInterval(() => {
    if (v > 0.05) { v -= 0.05; el.audio.volume = v; } 
    else { el.audio.volume = 0; el.audio.pause(); clearInterval(interval); }
  }, 50);
}

// --- CONTROLS ---
function runRandom() {
  if (!randomActive) return;
  const pool = audioElements.filter(el => el.loaded);
  if (pool.length === 0) { 
    audioElements.forEach(el => el.btn.click());
    nextCycleTimeout = setTimeout(runRandom, 2000);
    return;
  }
  const count = Math.floor(Math.random() * 2) + 1;
  const toPlay = pool.sort(() => 0.5 - Math.random()).slice(0, count);
  audioElements.forEach(el => {
    if (toPlay.includes(el)) { if(!el.active) fadeIn(el); } 
    else { if(el.active) fadeOut(el); }
  });
  nextCycleTimeout = setTimeout(runRandom, currentSpeedValue * 1000);
}

function toggleSleep() {
  sleepMode = !sleepMode;
  document.body.classList.toggle('fancy-bg', !sleepMode);
  document.body.style.background = sleepMode ? "#000" : "";
  document.getElementById('stars').classList.toggle('hidden', sleepMode);
  toggleFirebaseNetwork(!sleepMode);
  updateUI();
}

let currentSpeedKey = 'fast';
function setSpeed(v, key) {
  currentSpeedValue = v; currentSpeedKey = key;
  updateUI();
  document.getElementById('speedDropdown').classList.remove('open');
  if(randomActive) { clearTimeout(nextCycleTimeout); runRandom(); }
}

document.getElementById('randomBtn').onclick = () => {
    randomActive = !randomActive;
    if (randomActive) runRandom(); else { clearTimeout(nextCycleTimeout); audioElements.forEach(fadeOut); }
    updateUI();
};

document.getElementById('sleepBtn').onclick = toggleSleep;
document.getElementById('speedTrigger').onclick = (e) => { e.stopPropagation(); document.getElementById('speedDropdown').classList.toggle('open'); };
document.querySelectorAll('.lang-switcher-btn').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); langIdx = (langIdx + 1) % 4; updateUI(); }; });
document.getElementById('repairBtn').onclick = () => location.reload();
document.getElementById('closeWelcome').onclick = () => { document.getElementById('welcomeModal').style.display='none'; };
function showHelp() { document.getElementById('welcomeModal').style.display = 'flex'; }

function updateUI() {
  const t = uiTL[langOrder[langIdx]];
  document.getElementById('title').innerText = t.title;
  document.querySelectorAll('.lang-switcher-btn').forEach(btn => btn.innerText = t.code);
  document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
  document.getElementById('repairBtn').innerText = t.repair;
  document.getElementById('speedTrigger').innerText = t.speeds[currentSpeedKey];
  document.getElementById('sleepBtn').innerText = `${t.sleep}: ${sleepMode ? 'ON' : 'OFF'}`;
  document.getElementById('sleepBtn').classList.toggle('active', sleepMode);
  document.getElementById('featuresList').innerHTML = t.features.map(f => `<li>${f}</li>`).join('');
  audioElements.forEach((el, i) => el.btn.querySelector('span').innerText = sounds[i].name[langOrder[langIdx]]);
  const speedBtns = document.querySelectorAll('#speedDropdown button');
  speedBtns[0].innerText = t.speeds.fast; speedBtns[1].innerText = t.speeds.medium; speedBtns[2].innerText = t.speeds.slow;
}

// --- VISUALS (Stars) ---
const canvas = document.getElementById('stars'), ctx = canvas.getContext('2d');
function res() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.onresize = res; res();
const starsArr = Array.from({length:80}, () => ({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.5, a:Math.random(), t:Math.random()*0.01 }));
function animate() {
  if (!sleepMode) {
    ctx.clearRect(0,0,innerWidth,innerHeight);
    starsArr.forEach(s => { s.a+=s.t; if(s.a>1||s.a<0.1) s.t*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`; ctx.fill(); });
  }
  requestAnimationFrame(animate);
}
animate();
window.onclick = () => document.getElementById('speedDropdown').classList.remove('open');
updateUI();
</script>
</body>
</html>
