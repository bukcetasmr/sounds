<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR | PROGRESS EDITION</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  
  .container { 
    position: relative; z-index: 10; 
    display:flex; flex-direction: column; align-items:center; 
    padding:20px; height: 100vh; box-sizing: border-box; 
  }

  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:24px; color:#ffb400; text-shadow:0 0 10px rgba(255,180,0,0.5); }
  
  #langBtn {
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 6px 12px; border-radius: 8px; color: white; cursor: pointer; font-size: 12px;
  }

  .controls { margin-bottom:15px; display:flex; gap:10px; z-index: 10; }
  .controls > button { 
    padding:10px 20px; border:none; border-radius:12px; 
    background: rgba(255,255,255,0.15); color:white; cursor:pointer; 
    font-weight:bold; backdrop-filter: blur(10px); font-size: 14px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #randomBtn { background: rgba(138, 43, 226, 0.4); }

  .sound-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 15px; width: 100%; max-width: 500px; padding: 10px; overflow-y: auto; flex-grow: 1; z-index: 5;
  }

  .sound-button { 
    aspect-ratio: 1 / 1; border: none; border-radius: 24px; 
    background: rgba(255,255,255,0.08); color:white; font-weight:bold; 
    cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; 
    backdrop-filter: blur(12px); transition: transform 0.2s, background 0.3s; font-size: 12px; text-align: center;
    border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
  }

  /* Индикация загрузки */
  .load-progress-bg {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
    background: rgba(255, 180, 0, 0.2); z-index: -1; transition: height 0.2s ease-out;
  }

  .status-label {
    font-size: 9px; margin-top: 6px; opacity: 0.5; font-weight: normal;
  }

  .sound-button.active { box-shadow: 0 0 20px rgba(255,180,0,0.2); border-color: rgba(255,180,0,0.4); }
  .sound-button.broken { border: 1px solid rgba(255, 50, 50, 0.5); }
  .sound-button:active { transform: scale(0.95); }

  .tile-vis {
    position: absolute; bottom: 10px; width: 30px; height: 3px; 
    background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; display: none;
  }
  .tile-vis-bar { height: 100%; width: 0%; background: #ffb400; }
  .sound-button.active .tile-vis { display: block; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 1; }
  
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(10px);
  }
  .modal-content {
    background: #111; border: 1px solid #333;
    padding: 30px; border-radius: 30px; text-align: center; color: white; max-width: 80%;
  }
  .modal-btn {
    background:#ffb400; border:none; padding:15px 40px; border-radius:15px; 
    font-weight:bold; cursor:pointer; color:black; font-size: 16px; margin-top: 20px;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>
<div class="overlay"></div>

<div id="welcomeModal" class="modal" style="display: flex;">
  <div class="modal-content">
    <h2 style="color: #ffb400; margin-bottom: 10px;">Smart Loader</h2>
    <p style="opacity: 0.8; font-size: 14px; line-height: 1.5;">Мы добавили мониторинг трафика. Если Loading 0% сменится на Error — проверьте интернет или VPN.</p>
    <button class="modal-btn" id="closeWelcome">СТАРТ</button>
  </div>
</div>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <button id="langBtn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="reloadBtn" onclick="location.reload()">Reload</button>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null;
let langIdx = 0;
const langOrder = ['en', 'uk', 'ru'];
let audioElements = [], randomActive = false;

const sounds = [
  {file:'purplebrush.mp3', name:{en:'Brush', ru:'Кисть', uk:'Пензель'}, color:'rgba(150,100,255,0.5)'},
  {file:'choko.mp3', name:{en:'Choco', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.5)'},
  {file:'strawberry.mp3', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.5)'},
  {file:'wax.mp3', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.5)'},
  {file:'woodandrocks.mp3', name:{en:'Wood', ru:'Дерево', uk:'Дерево'}, color:'rgba(255,255,0,0.5)'}
];

const uiTL = {
  en: { play: "Play", pause: "Pause", loading: "Loading", ready: "Ready", error: "Error", processing: "Wait..." },
  ru: { play: "Играть", pause: "Пауза", loading: "Загрузка", ready: "Готов", error: "Ошибка", processing: "Ждите..." },
  uk: { play: "Грати", pause: "Пауза", loading: "Завантаження", ready: "Готов", error: "Помилка", processing: "Чекайте..." }
};

function initAudioContext() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.fftSize = 64;
  globalAnalyser.connect(audioCtx.destination);
}

async function loadSound(state, fileName) {
  const url = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${fileName}?v=${Date.now()}`;
  const t = uiTL[langOrder[langIdx]];
  
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error();

    const reader = response.body.getReader();
    const contentLength = +response.headers.get('Content-Length');
    
    let receivedLength = 0;
    let chunks = []; 
    
    while(true) {
      const {done, value} = await reader.read();
      if (done) break;
      chunks.push(value);
      receivedLength += value.length;
      
      if (contentLength) {
        const percent = Math.round((receivedLength / contentLength) * 100);
        state.statusLabel.innerText = `${t.loading} ${percent}%`;
        state.progressBg.style.height = percent + "%";
      }
    }

    state.statusLabel.innerText = t.processing;
    const blob = new Blob(chunks);
    state.audio.src = URL.createObjectURL(blob);
    
    state.audio.oncanplaythrough = () => {
      state.ready = true;
      state.statusLabel.innerText = t.ready;
      state.progressBg.style.height = "0%";
      state.btn.classList.remove('broken');
    };

  } catch (err) {
    // FALLBACK: Если fetch/CORS не сработал, пробуем обычный метод
    state.audio.src = url;
    state.audio.load();
    state.audio.oncanplaythrough = () => {
      state.ready = true;
      state.statusLabel.innerText = t.ready;
    };
    state.audio.onerror = () => {
      state.statusLabel.innerText = t.error;
      state.btn.classList.add('broken');
    };
  }
}

const grid = document.getElementById('soundGrid');
sounds.forEach((s) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `
    <div class="load-progress-bg"></div>
    <span class="name-txt">${s.name[langOrder[langIdx]]}</span>
    <span class="status-label">...</span>
    <div class="tile-vis"><div class="tile-vis-bar"></div></div>
  `;
  grid.appendChild(btn);

  const audio = new Audio();
  audio.loop = true; audio.crossOrigin = "anonymous";

  const state = { 
    audio, btn, color: s.color, ready: false,
    visBar: btn.querySelector('.tile-vis-bar'),
    statusLabel: btn.querySelector('.status-label'),
    progressBg: btn.querySelector('.load-progress-bg'),
    nameTxt: btn.querySelector('.name-txt'),
    source: null, gainNode: null, analyser: null, names: s.name
  };

  btn.onclick = () => { 
    initAudioContext(); 
    if(!state.ready) return;
    audio.paused ? fadeIn(state) : fadeOut(state); 
  };
  
  audioElements.push(state);
  loadSound(state, s.file);
});

function fadeIn(el) {
  if (!el.source && audioCtx) {
    el.source = audioCtx.createMediaElementSource(el.audio);
    el.gainNode = audioCtx.createGain();
    el.analyser = audioCtx.createAnalyser();
    el.analyser.fftSize = 32;
    el.source.connect(el.gainNode);
    el.gainNode.connect(el.analyser);
    el.analyser.connect(globalAnalyser);
  }
  el.audio.play();
  el.btn.classList.add('active');
  el.gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.2);
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  if(el.gainNode) el.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
  setTimeout(() => { if(!el.btn.classList.contains('active')) el.audio.pause(); }, 500);
}

// Визуализация звезд
const sCanvas = document.getElementById('stars'); const sCtx = sCanvas.getContext('2d');
const vCanvas = document.getElementById('vis'); const vCtx = vCanvas.getContext('2d');
function res() { sCanvas.width = vCanvas.width = innerWidth; sCanvas.height = vCanvas.height = innerHeight; }
window.onresize = res; res();

const stars = Array.from({length:60}, () => ({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.2, a:Math.random() }));

function animate(){
  sCtx.clearRect(0,0,innerWidth,innerHeight);
  stars.forEach(s => {
    s.a += 0.005;
    sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sCtx.fillStyle = `rgba(255,255,255,${(Math.sin(s.a)+1)/2})`; sCtx.fill();
  });

  audioElements.forEach(el => {
    if(el.analyser && el.btn.classList.contains('active')) {
        const data = new Uint8Array(el.analyser.frequencyBinCount);
        el.analyser.getByteFrequencyData(data);
        el.visBar.style.width = (data[0]/255)*100 + "%";
        el.btn.style.backgroundColor = el.color.replace('0.5', 0.1 + (data[0]/255)*0.5);
    }
  });
  requestAnimationFrame(animate);
}
animate();

document.getElementById('langBtn').onclick = () => {
  langIdx = (langIdx + 1) % langOrder.length;
  const t = uiTL[langOrder[langIdx]];
  document.getElementById('langBtn').innerText = langOrder[langIdx].toUpperCase();
  document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
  audioElements.forEach(el => {
    el.nameTxt.innerText = el.names[langOrder[langIdx]];
    if(el.ready) el.statusLabel.innerText = t.ready;
  });
};

document.getElementById('randomBtn').onclick = () => {
  initAudioContext();
  randomActive = !randomActive;
  const t = uiTL[langOrder[langIdx]];
  document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
  if(!randomActive) audioElements.forEach(fadeOut);
  else runRandom();
};

function runRandom() {
  if(!randomActive) return;
  const ready = audioElements.filter(el => el.ready);
  if(ready.length) {
    audioElements.forEach(fadeOut);
    fadeIn(ready[Math.floor(Math.random()*ready.length)]);
  }
  setTimeout(runRandom, 15000);
}

document.getElementById('closeWelcome').onclick = () => {
  initAudioContext();
  document.getElementById('welcomeModal').style.display='none';
};
</script>
</body>
</html>
