<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BUCKET ASMR | SAFARI FIX</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
    font-family: Arial, sans-serif; color: white; overflow: hidden;
  }
  .container { 
    display:flex; flex-direction: column; align-items:center; 
    padding:20px; height: 100vh; box-sizing: border-box; position: relative; z-index: 10;
  }
  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; }
  h1 { margin:0; font-size:26px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  .controls { margin-bottom:15px; display:flex; gap:10px; z-index: 10; }
  .controls > button { 
    padding:8px 14px; border:none; border-radius:12px; 
    background: rgba(255,255,255,0.2); color:white; cursor:pointer; font-weight:bold;
  }
  #randomBtn { background: rgba(138, 43, 226, 0.4); }

  .sound-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
    gap: 15px; width: 100%; max-width: 600px; padding: 10px; overflow-y: auto; flex-grow: 1;
  }

  .sound-button { 
    aspect-ratio: 1 / 1; border: none; border-radius: 20px; 
    background: rgba(255,255,255,0.15); color:white; font-weight:bold; 
    cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; 
    backdrop-filter: blur(8px); transition: 0.3s; font-size: 11px; text-align: center;
    border: 1px solid rgba(255,255,255,0.05); position: relative;
  }

  .sound-button.waiting { opacity: 0.4; color: #aaa; }
  .sound-button.loading { color: #ffb400; animation: pulse 1.5s infinite; }
  .sound-button.active { box-shadow: 0 0 15px rgba(255,255,255,0.2); }

  @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

  .tile-vis {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 3px; background: rgba(255,255,255,0.2);
    border-radius: 2px; display: none; overflow: hidden;
  }
  .tile-vis-bar { height: 100%; width: 0%; background: #fff; }
  .sound-button.active .tile-vis { display: block; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <button id="langBtn" style="background:none; border:1px solid #555; border-radius:5px; color:white; padding:5px 10px;">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button onclick="location.reload()" style="background:rgba(255,0,0,0.2)">RELOAD</button>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null;
let langIdx = 0;
const langOrder = ['en', 'uk', 'ru'];
let audioElements=[], particles=[], randomActive=false;

const sounds = [
  {file:'purplebrush.ogg', name:{en:'Brush', ru:'Кисть', uk:'Пензель'}, color:'rgba(150,100,255,0.5)'},
  {file:'choko.ogg', name:{en:'Choco', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.5)'},
  {file:'strawberry.ogg', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.5)'},
  {file:'wax.ogg', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.5)'},
  {file:'woodandrocks.ogg', name:{en:'Wood', ru:'Дерево', uk:'Дерево'}, color:'rgba(255,255,0,0.5)'}
];

const uiTL = {
  en: { play: "Play", pause: "Stop", loading: "Load...", wait: "Wait..." },
  ru: { play: "Старт", pause: "Стоп", loading: "Загрузка...", wait: "Жди..." },
  uk: { play: "Старт", pause: "Стоп", loading: "Завантаження...", wait: "Чекай..." }
};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.fftSize = 64;
  globalAnalyser.connect(audioCtx.destination);
}

const grid = document.getElementById('soundGrid');

// Создаем кнопки
sounds.forEach((s, idx) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button waiting'; // Сначала все в ожидании
  btn.innerHTML = `<span>${uiTL.en.wait}</span><div class="tile-vis"><div class="tile-vis-bar"></div></div>`;
  grid.appendChild(btn);

  const audio = new Audio();
  audio.loop = true; audio.crossOrigin = "anonymous"; audio.setAttribute('playsinline', '');

  const state = { audio, btn, color: s.color, visBar: btn.querySelector('.tile-vis-bar'), ready: false, source: null, gain: null, analyser: null, fileName: s.file };
  
  btn.onclick = () => {
    initAudio();
    if(!state.ready) return;
    state.audio.paused ? fadeIn(state) : fadeOut(state);
  };
  audioElements.push(state);
});

// УМНАЯ ОЧЕРЕДЬ ЗАГРУЗКИ
async function loadQueue() {
    for (let i = 0; i < audioElements.length; i++) {
        const el = audioElements[i];
        el.btn.classList.remove('waiting');
        el.btn.classList.add('loading');
        el.btn.querySelector('span').innerText = uiTL[langOrder[langIdx]].loading;

        // Cache Buster: добавляем случайную версию, чтобы Safari не тупил
        el.audio.src = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${el.fileName}?v=${Date.now()}`;
        el.audio.load();

        await new Promise((resolve) => {
            el.audio.oncanplaythrough = () => {
                el.ready = true;
                el.btn.classList.remove('loading');
                el.btn.querySelector('span').innerText = sounds[i].name[langOrder[langIdx]];
                resolve();
            };
            // Если файл не грузится дольше 10 сек, идем к следующему
            setTimeout(resolve, 10000); 
        });
    }
}

function fadeIn(el) {
  el.audio.play().then(() => {
    if (!el.source) {
      el.source = audioCtx.createMediaElementSource(el.audio);
      el.gain = audioCtx.createGain();
      el.analyser = audioCtx.createAnalyser();
      el.source.connect(el.gain);
      el.gain.connect(el.analyser);
      el.analyser.connect(globalAnalyser);
    }
    el.btn.classList.add('active');
    el.gain.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.3);
  });
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  if(el.gain) el.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
  setTimeout(() => { if(!el.btn.classList.contains('active')) el.audio.pause(); }, 500);
}

// Запускаем очередь после первого клика по странице (требование браузеров)
document.addEventListener('click', () => {
    if (audioElements[0].audio.src === "") loadQueue();
}, { once: true });

// Визуал (звезды)
const sCanvas = document.getElementById('stars'); const sCtx = sCanvas.getContext('2d');
const vCanvas = document.getElementById('vis'); const vCtx = vCanvas.getContext('2d');
function resize() { sCanvas.width = vCanvas.width = innerWidth; sCanvas.height = vCanvas.height = innerHeight; }
window.onresize = resize; resize();
const stars = Array.from({length:60}, () => ({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, s:Math.random()*0.02 }));

function draw() {
  sCtx.clearRect(0,0,innerWidth,innerHeight);
  vCtx.clearRect(0,0,innerWidth,innerHeight);
  stars.forEach(s => {
    let alpha = 0.3 + Math.abs(Math.sin(Date.now()*s.s))*0.7;
    sCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    sCtx.fillRect(s.x, s.y, 1.5, 1.5);
  });
  
  audioElements.forEach(el => {
    if(el.btn.classList.contains('active') && el.analyser) {
        let data = new Uint8Array(16);
        el.analyser.getByteFrequencyData(data);
        el.visBar.style.width = (data[2]/255*100)+'%';
        el.btn.style.backgroundColor = el.color.replace('0.5', (0.1 + data[2]/255*0.4));
    } else {
        el.btn.style.backgroundColor = 'rgba(255,255,255,0.15)';
    }
  });
  requestAnimationFrame(draw);
}
draw();

document.getElementById('langBtn').onclick = () => {
  langIdx = (langIdx + 1) % 3;
  document.getElementById('langBtn').innerText = langOrder[langIdx].toUpperCase();
};
</script>
</body>
</html>
