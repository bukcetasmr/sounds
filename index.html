<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR Premium</title>
<style>
  /* Стили экрана доступа */
  #pass-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
    z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s;
  }
  #pass-screen.hidden { opacity: 0; visibility: hidden; }
  .lock-box {
    background: rgba(255, 255, 255, 0.05); border: 1px solid #ffb400;
    padding: 40px 30px; border-radius: 30px; backdrop-filter: blur(20px);
    text-align: center; box-shadow: 0 0 30px rgba(255, 180, 0, 0.2); width: 280px;
  }
  .lock-box h2 { color: #ffb400; margin-bottom: 20px; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
  #pass-input {
    width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 18px;
    margin-bottom: 15px; outline: none; box-sizing: border-box;
  }
  .pass-btn { background: #ffb400; color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
  .error-msg { color: #ff5050; font-size: 13px; margin-top: 10px; display: none; }

  /* Основной интерфейс */
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #050505; transition: background 3s ease;
    font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.fancy-bg { background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%); }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  .container { position: relative; z-index: 10; display:flex; flex-direction: column; align-items:center; padding:20px; height: 100vh; box-sizing: border-box; }
  
  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:24px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  .live-counter {
    background: rgba(255, 50, 50, 0.15); border: 1px solid rgba(255, 50, 50, 0.4);
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: #ff8080;
    display: flex; align-items: center; gap: 5px; text-transform: uppercase;
  }
  .live-dot { width: 6px; height: 6px; background: #ff3030; border-radius: 50%; animation: blink 1.5s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { padding:8px 14px; border:none; border-radius:12px; background: rgba(255,255,255,0.15); color:white; cursor:pointer; font-weight:bold; backdrop-filter: blur(5px); font-size: 13px; transition: 0.3s; }
  
  #randomBtn { background: rgba(138, 43, 226, 0.4); border: 1px solid rgba(138, 43, 226, 0.3); min-width: 80px; }
  #sleepBtn.active { background: rgba(100, 150, 255, 0.3); border: 1px solid #4466ff; }

  /* Сетка звуков */
  .sound-grid { 
    display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
    gap: 15px; width: 100%; max-width: 600px; padding: 10px; 
    overflow-y: auto; flex-grow: 1; z-index: 5; 
  }
  .sound-button { 
    aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; 
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); 
    font-weight: bold; cursor: pointer; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; backdrop-filter: blur(8px); 
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-size: 11px; text-align: center; 
    position: relative; overflow: hidden; padding: 5px;
  }
  .sound-button.ready { color: white; background: rgba(255,255,255,0.12); }
  .sound-button.active { color: white; transform: scale(1.03); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 0 20px rgba(255,180,0,0.2); }
  
  /* Автономная пульсация (вместо сложного Web Audio) */
  .pulse-ring {
    position: absolute; width: 100%; height: 100%; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    opacity: 0; transform: scale(0.5); pointer-events: none;
  }
  .active .pulse-ring { animation: pulseAnim 3s infinite; }
  @keyframes pulseAnim { 0% { transform: scale(0.6); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0; } }

  .mute-btn { 
    position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; 
    background: rgba(255,255,255,0.1); border-radius: 50%; display: none; 
    align-items: center; justify-content: center; font-size: 10px; border: 1px solid rgba(255,255,255,0.2);
  }
  .active .mute-btn { display: flex; }
  .mute-btn.muted { background: #ff5050; }

  /* Выпадающее меню скорости */
  .custom-select-container { position: relative; }
  .select-trigger { padding: 8px 14px; border-radius: 12px; background: rgba(255, 255, 255, 0.15); color: white; cursor: pointer; font-weight: bold; font-size: 13px; min-width: 90px; text-align: center; }
  .custom-dropdown { display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: #1e1e2d; border-radius: 15px; flex-direction: column; z-index: 3000; overflow: hidden; min-width: 120px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button { padding: 12px; border: none; background: transparent; color: white; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
  
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(12px); }
  .modal-content { background: #0f0f1a; border: 1px solid #ffb400; padding: 25px; border-radius: 30px; width: 320px; text-align: center; }
  .modal-btn { background:#ffb400; border:none; padding:14px; border-radius:15px; font-weight:bold; width: 100%; margin-top: 15px; font-size: 16px; }
  
  /* Скрытый "якорь" для iOS */
  #bg-anchor { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
</style>
</head>
<body class="fancy-bg">

<audio id="bg-anchor" loop playsinline>
    <source src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3" type="audio/mpeg">
</audio>

<div id="pass-screen">
  <div class="lock-box">
    <h2>Access Code</h2>
    <input type="password" id="pass-input" placeholder="••••••••" autofocus>
    <button class="pass-btn" onclick="checkPass()">Enter Premium</button>
    <div id="error-msg" class="error-msg">Invalid access code</div>
  </div>
</div>

<canvas id="stars"></canvas>
<div class="overlay"></div>

<div id="welcomeModal" class="modal">
  <div class="modal-content">
    <h2 style="color: #ffb400; margin: 0 0 15px 0;">BUCKET ASMR</h2>
    <p style="font-size: 13px; color: #ccc; line-height: 1.5;">Premium mode activated.<br>Background play enabled for iOS 18.</p>
    <button class="modal-btn" id="closeWelcome">START MIXING</button>
  </div>
</div>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <div class="live-counter">
      <div class="live-dot"></div>
      <span id="online-count">—</span> LIVE
    </div>
    <button id="langBtn" class="lang-btn-ui">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="sleepBtn">Sleep: OFF</button>
    <button id="repairBtn">REPAIR</button>
    <div class="custom-select-container">
        <div class="select-trigger" id="speedTrigger">Fast</div>
        <div class="custom-dropdown" id="speedDropdown">
            <button onclick="setSpeed(11, 'fast')">Fast</button>
            <button onclick="setSpeed(24, 'medium')">Medium</button>
            <button onclick="setSpeed(46, 'slow')">Slow</button>
        </div>
    </div>
  </div>
  
  <div id="soundGrid" class="sound-grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyAhDzJnUnVFQRlojHZaWp00IgrPsfbmkKo",
  authDomain: "bucket-asmr-premium.firebaseapp.com",
  projectId: "bucket-asmr-premium",
  databaseURL: "https://bucket-asmr-premium-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const connectionsRef = firebase.database().ref('online_users');

function updateConnections() {
    connectionsRef.on('value', snap => {
        document.getElementById('online-count').innerText = snap.numChildren() || 1;
    });
}

// --- КОНФИГУРАЦИЯ ---
const sounds = [
  { "file": "purplebrush.mp3", "name": "Purple Brush", "color": "#9664ff" },
  { "file": "greybrush.mp3", "name": "Grey Brush", "color": "#8c8c8c" },
  { "file": "pinksoftbrush.mp3", "name": "Soft Brush", "color": "#ffb6c1" },
  { "file": "strawberry.mp3", "name": "Strawberry", "color": "#ff69b4" },
  { "file": "wax.mp3", "name": "Wax", "color": "#ffa500" },
  { "file": "carrot.mp3", "name": "Carrot", "color": "#ff8c00" },
  { "file": "choko.mp3", "name": "Choco", "color": "#8b4513" },
  { "file": "wood.mp3", "name": "Wood", "color": "#ffff00" },
  { "file": "oldphone.mp3", "name": "Old Phone", "color": "#323232" }
];

let audioElements = [], randomActive = false, sleepMode = false;
let currentSpeedValue = 11, nextCycleTimeout = null;

// --- ИНИЦИАЛИЗАЦИЯ ---
function checkPass() {
  if (btoa(document.getElementById('pass-input').value) === 'YnVja2V0MjAyNg==') {
    document.getElementById('pass-screen').classList.add('hidden');
    document.getElementById('welcomeModal').style.display = 'flex';
    updateConnections();
    initMediaSession();
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}

function initMediaSession() {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: 'BUCKET ASMR Premium',
      artist: 'Deep Sleep Mixer',
      artwork: [{ src: 'https://img.icons8.com/fluency/240/null/bucket.png', sizes: '240x240', type: 'image/png' }]
    });
    // Обработка системных кнопок iOS
    navigator.mediaSession.setActionHandler('play', () => {
        document.getElementById('bg-anchor').play();
        audioElements.forEach(el => { if(el.active) el.audio.play(); });
    });
    navigator.mediaSession.setActionHandler('pause', () => {
        audioElements.forEach(el => el.audio.pause());
    });
  }
}

const grid = document.getElementById('soundGrid');
sounds.forEach((s, idx) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<div class="pulse-ring"></div><div class="mute-btn">🔊</div><span>${s.name}</span>`;
  grid.appendChild(btn);

  const audio = new Audio();
  audio.loop = true;
  audio.crossOrigin = "anonymous";
  audio.setAttribute('playsinline', '');
  
  const state = { 
    audio, btn, active: false, muted: false, 
    fileName: s.file, color: s.color 
  };

  btn.onclick = () => {
    // "Прогрев" аудио-якоря при первом клике
    document.getElementById('bg-anchor').play().catch(()=>{});
    
    if (!state.loaded) {
        state.audio.src = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${state.fileName}`;
        state.audio.load();
        state.loaded = true;
        btn.classList.add('ready');
    }
    state.active ? fadeOut(state) : fadeIn(state);
  };

  btn.querySelector('.mute-btn').onclick = (e) => {
    e.stopPropagation();
    state.muted = !state.muted;
    state.audio.volume = state.muted ? 0 : 0.6;
    btn.querySelector('.mute-btn').classList.toggle('muted', state.muted);
    btn.querySelector('.mute-btn').innerText = state.muted ? '🔇' : '🔊';
  };

  audioElements.push(state);
});

function fadeIn(el) {
  el.active = true;
  el.btn.classList.add('active');
  el.btn.style.backgroundColor = el.color + "44"; // 44 - это прозрачность
  el.audio.volume = 0;
  el.audio.play();
  
  let v = 0;
  const interval = setInterval(() => {
    if (v < 0.6 && !el.muted) {
      v += 0.05;
      el.audio.volume = Math.min(v, 0.6);
    } else { clearInterval(interval); }
  }, 50);
}

function fadeOut(el) {
  el.active = false;
  el.btn.classList.remove('active');
  el.btn.style.backgroundColor = "";
  
  let v = el.audio.volume;
  const interval = setInterval(() => {
    if (v > 0.05) {
      v -= 0.05;
      el.audio.volume = v;
    } else {
      el.audio.volume = 0;
      el.audio.pause();
      clearInterval(interval);
    }
  }, 50);
}

// --- УПРАВЛЕНИЕ ---
document.getElementById('randomBtn').onclick = () => {
  randomActive = !randomActive;
  document.getElementById('randomBtn').innerText = randomActive ? "Pause" : "Play";
  if (randomActive) runRandom(); else clearTimeout(nextCycleTimeout);
};

function runRandom() {
  if (!randomActive) return;
  const pool = audioElements.filter(el => el.loaded);
  if (pool.length === 0) { 
    audioElements.forEach(el => el.btn.click()); // Форсируем загрузку
    nextCycleTimeout = setTimeout(runRandom, 2000);
    return;
  }
  
  const count = Math.floor(Math.random() * 2) + 1;
  const toPlay = pool.sort(() => 0.5 - Math.random()).slice(0, count);
  
  audioElements.forEach(el => {
    if (toPlay.includes(el)) { if(!el.active) fadeIn(el); } 
    else { if(el.active) fadeOut(el); }
  });

  nextCycleTimeout = setTimeout(runRandom, currentSpeedValue * 1000);
}

function setSpeed(v, label) {
    currentSpeedValue = v;
    document.getElementById('speedTrigger').innerText = label;
    document.getElementById('speedDropdown').classList.remove('open');
}

document.getElementById('speedTrigger').onclick = () => document.getElementById('speedDropdown').classList.toggle('open');
document.getElementById('repairBtn').onclick = () => location.reload();
document.getElementById('closeWelcome').onclick = () => document.getElementById('welcomeModal').style.display = 'none';

document.getElementById('sleepBtn').onclick = () => {
    sleepMode = !sleepMode;
    document.body.style.background = sleepMode ? "#000" : "";
    document.getElementById('stars').style.opacity = sleepMode ? "0" : "1";
    document.getElementById('sleepBtn').classList.toggle('active', sleepMode);
    document.getElementById('sleepBtn').innerText = `Sleep: ${sleepMode ? 'ON' : 'OFF'}`;
};

// --- ФОНОВЫЕ ЗВЕЗДЫ ---
const canvas = document.getElementById('stars'), ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.onresize = resize; resize();

const stars = Array.from({length: 70}, () => ({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: Math.random() * 1.5, a: Math.random(), s: Math.random() * 0.01
}));

function draw() {
  ctx.clearRect(0,0,innerWidth,innerHeight);
  if(!sleepMode) {
    stars.forEach(s => {
      s.a += s.s; if(s.a > 1 || s.a < 0) s.s *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`; ctx.fill();
    });
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
