<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BUCKET ASMR</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
    font-family: Arial, sans-serif; color: white; overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
  }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  
  .container { 
    position: relative; z-index: 10; 
    display:flex; flex-direction: column; align-items:center; 
    padding:20px; height: 100vh; box-sizing: border-box; 
  }

  .title-bar { 
    display:flex; align-items:center; gap:15px; margin-bottom:15px; position: relative;
    z-index: 1000;
  }
  h1 { margin:0; font-size:26px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  #helpBtn {
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
    width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); transition: 0.3s;
  }

  #langBtn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 8px 16px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-weight: bold;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    min-width: 50px;
  }

  /* Стили для кастомных списков (ОТКРЫТИЕ ВНИЗ) */
  .custom-select-container { position: relative; }
  .select-trigger {
    padding: 8px 14px; border-radius: 12px;
    background: rgba(255, 255, 255, 0.2); color: white; cursor: pointer;
    font-weight: bold; backdrop-filter: blur(5px); font-size: 13px; transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 80px; text-align: center;
  }

  .custom-dropdown {
    display: none; 
    position: absolute; 
    top: 40px; /* Изменено с bottom на top для открытия вниз */
    left: 50%; 
    transform: translateX(-50%);
    background: rgba(30, 30, 45, 0.95); 
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px; 
    flex-direction: column; 
    z-index: 3000; 
    overflow: hidden;
    min-width: 120px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
    backdrop-filter: blur(15px);
  }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button {
    padding: 10px 15px; border: none; background: transparent; color: white;
    cursor: pointer; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1);
    text-align: center;
  }
  .custom-dropdown button:hover { background: rgba(255,255,255,0.15); }
  .custom-dropdown button:last-child { border-bottom: none; }

  .sound-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
    gap: 15px; width: 100%; max-width: 600px;
    padding: 10px; overflow-y: auto;
    flex-grow: 1;
    z-index: 5;
  }

  .sound-button { 
    aspect-ratio: 1 / 1; border: none; border-radius: 20px; 
    background: rgba(255,255,255,0.15); color:white; font-weight:bold; 
    cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; 
    backdrop-filter: blur(8px); transition: 0.3s; font-size: 12px; text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative; overflow: hidden;
  }
  .sound-button.active { box-shadow: 0 0 25px rgba(255,255,255,0.1); }

  .tile-vis {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden; display: none;
  }
  .tile-vis-bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.05s ease-out; }
  .sound-button.active .tile-vis { display: block; }

  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { 
    padding:8px 14px; border:none; border-radius:12px; 
    background: rgba(255,255,255,0.2); color:white; cursor:pointer; 
    font-weight:bold; backdrop-filter: blur(5px); font-size: 13px; transition: 0.2s;
  }
  
  #randomBtn { background: rgba(138, 43, 226, 0.4); border: 1px solid rgba(138, 43, 226, 0.5); }

  #helpModal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(8px);
  }
  .help-content {
    position: relative; background: rgba(20, 20, 35, 0.95); border: 1px solid #ffb400;
    padding: 30px 20px; border-radius: 24px; max-width: 85%; width: 340px; text-align: center;
  }
  #closeHelp { position: absolute; top: 10px; right: 15px; font-size: 32px; color: #ffb400; cursor: pointer; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>
<div class="overlay"></div>

<div id="helpModal">
  <div class="help-content">
    <div id="closeHelp">×</div>
    <h2 id="helpTitle" style="color: #ffb400; margin-top: 0;">GUIDE</h2>
    <div id="helpText">
      <div class="help-line"><b id="hPlay">Play</b> <span id="hPlayD">Auto-mix sounds.</span></div>
      <div class="help-line"><b id="hTiles">Tiles</b> <span id="hTilesD">Tap to toggle sounds.</span></div>
      <div class="help-line"><b id="hTimer">Timer</b> <span id="hTimerD">Sets sleep countdown.</span></div>
    </div>
    <p style="font-size: 12px; opacity: 0.5; margin-top: 20px;" id="helpClose">Tap X to close</p>
  </div>
</div>

<div class="container">
  <div class="title-bar" id="mainHeader">
    <h1 id="title">BUCKET ASMR</h1>
    <div id="helpBtn">?</div>
    <button id="langBtn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    
    <!-- Скорость (Выпадает вниз) -->
    <div class="custom-select-container">
        <div class="select-trigger" id="speedTrigger">10s</div>
        <div class="custom-dropdown" id="speedDropdown">
            <button onclick="setSpeed(10, '10s')">10s</button>
            <button onclick="setSpeed(30, '30s')">30s</button>
            <button onclick="setSpeed(60, '1m')">1m</button>
            <button onclick="setSpeed(300, '5m')">5m</button>
        </div>
    </div>

    <!-- Таймер сна (Выпадает вниз) -->
    <div class="custom-select-container">
        <div class="select-trigger" id="sleepTrigger">15m</div>
        <div class="custom-dropdown" id="sleepDropdown">
            <button onclick="setSleep(900, '15m')">15m</button>
            <button onclick="setSleep(1800, '30m')">30m</button>
            <button onclick="setSleep(2700, '45m')">45m</button>
            <button onclick="setSleep(3600, '1h')">1h</button>
            <button onclick="setSleep(7200, '2h')">2h</button>
        </div>
    </div>

    <button id="timerBtn">Start timer</button>
    <span id="timerDisplay" style="color:#9b59b6; font-weight:bold;">00:00</span>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null, dataArray = null;
const langOrder = ['en', 'uk', 'ru'];
let langIdx = 0;
let currentSpeedValue = 30;
let currentSleepValue = 900;

function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.fftSize = 64;
  globalAnalyser.connect(audioCtx.destination);
  dataArray = new Uint8Array(globalAnalyser.frequencyBinCount);
  audioElements.forEach(el => setupWebAudio(el));
}

function setupWebAudio(el) {
  if (!audioCtx) return;
  el.source = audioCtx.createMediaElementSource(el.audio);
  el.gainNode = audioCtx.createGain();
  el.analyser = audioCtx.createAnalyser();
  el.analyser.fftSize = 32;
  el.tileDataArray = new Uint8Array(el.analyser.frequencyBinCount);
  el.source.connect(el.gainNode);
  el.gainNode.connect(el.analyser);
  el.analyser.connect(globalAnalyser);
  el.gainNode.gain.value = 0;
}

const sounds = [
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/purplebrush.wav', name:{en:'Brush', ru:'Кисть', uk:'Пензель'}, color:'rgba(150,100,255,0.5)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/choko.wav', name:{en:'Choco', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.5)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/strawberry.wav', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.5)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/wax.wav', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.5)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/woodandrocks.wav', name:{en:'Wood', ru:'Дерево', uk:'Дерево'}, color:'rgba(255,255,0,0.5)'}
];

const uiTL = {
  en: { code: "EN", title: "BUCKET ASMR", play: "Play", pause: "Pause", start: "Start timer", stop: "Stop timer", hPlay: "Auto-Mix", hPlayD: "Automatically mixes sounds.", hTiles: "Tiles", hTilesD: "Tap to turn sound on/off.", hTimer: "Timer", hTimerD: "Sleep timer countdown.", close: "Tap X to close", min: "min", hour: "hour", hours: "hours" },
  ru: { code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", start: "Запуск таймера", stop: "Остановить", hPlay: "Авто-микс", hPlayD: "Случайное смешивание звуков.", hTiles: "Плитки", hTilesD: "Нажми, чтобы включить/выключить.", hTimer: "Таймер", hTimerD: "Таймер автоматического выключения.", close: "Нажми на X, чтобы закрыть", min: "мин", hour: "час", hours: "часа" },
  uk: { code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", start: "Запуск таймера", stop: "Зупинити", hPlay: "Авто-мікс", hPlayD: "Випадкове змішування звуків.", hTiles: "Плитки", hTilesD: "Натисни, щоб увімкнути або вимкнути.", hTimer: "Таймер", hTimerD: "Таймер автоматичного вимкнення.", close: "Натисни X, чтобы закрыть", min: "хв", hour: "година", hours: "години" }
};

let audioElements=[], particles=[], randomActive=false, randomTimeout=null, timerInterval=null, timeLeft=0;

function setSpeed(val, label) {
    currentSpeedValue = val;
    document.getElementById('speedTrigger').innerText = label;
    document.getElementById('speedDropdown').classList.remove('open');
}
function setSleep(val, label) {
    currentSleepValue = val;
    document.getElementById('sleepTrigger').innerText = label;
    document.getElementById('sleepDropdown').classList.remove('open');
}

document.getElementById('speedTrigger').onclick = (e) => {
    e.stopPropagation();
    document.getElementById('sleepDropdown').classList.remove('open');
    document.getElementById('speedDropdown').classList.toggle('open');
};
document.getElementById('sleepTrigger').onclick = (e) => {
    e.stopPropagation();
    document.getElementById('speedDropdown').classList.remove('open');
    document.getElementById('sleepDropdown').classList.toggle('open');
};

const starCanvas = document.getElementById('stars'); const starCtx = starCanvas.getContext('2d');
function res() { starCanvas.width = innerWidth; starCanvas.height = innerHeight; }
res();
const starsArr = Array.from({length:160}, () => ({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.5, a:Math.random(), t:Math.random()*0.01 }));
function drawS(){
  starCtx.clearRect(0,0,innerWidth,innerHeight);
  starsArr.forEach(s=>{ s.a+=s.t; if(s.a>1||s.a<0.1) s.t*=-1; starCtx.beginPath(); starCtx.arc(s.x,s.y,s.r,0,Math.PI*2); starCtx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`; starCtx.fill(); });
  requestAnimationFrame(drawS);
}
drawS();

const grid = document.getElementById('soundGrid');
sounds.forEach((s, idx) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<span>${s.name[langOrder[langIdx]]}</span><div class="tile-vis"><div class="tile-vis-bar"></div></div>`;
  grid.appendChild(btn);
  const audio = new Audio(s.file); audio.loop = true; audio.crossOrigin = "anonymous";
  const state = { audio, btn, color: s.color, visBar: btn.querySelector('.tile-vis-bar'), targetVol: 0 };
  btn.onclick = (e) => { initAudioContext(); e.stopPropagation(); if(state.targetVol === 0) fadeIn(state); else fadeOut(state); };
  audioElements.push(state);
});

function getAverageVolume(array) {
    let values = 0;
    for (let i = 0; i < array.length; i++) values += array[i];
    return values / array.length;
}

function fadeIn(el) {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  el.audio.play().catch(()=>{});
  el.btn.classList.add('active');
  el.targetVol = 0.6;
  if(el.gainNode) {
    el.gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    el.gainNode.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 1.0);
  } else { el.audio.volume = 0.6; }
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  el.targetVol = 0;
  if(el.gainNode) {
    el.gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    el.gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3.0);
    setTimeout(() => { if(el.targetVol === 0) el.audio.pause(); }, 3100);
  } else { el.audio.volume = 0; el.audio.pause(); }
}

document.getElementById('randomBtn').onclick = () => {
  initAudioContext();
  randomActive = !randomActive;
  const currentLang = langOrder[langIdx];
  document.getElementById('randomBtn').innerText = randomActive ? uiTL[currentLang].pause : uiTL[currentLang].play;
  if(randomActive) runRandom(); else audioElements.forEach(fadeOut);
};

function runRandom() {
  if(!randomActive) return;
  let count = Math.floor(Math.random()*3)+1;
  let shuffled = [...audioElements].sort(() => 0.5-Math.random());
  audioElements.forEach(el => shuffled.slice(0, count).includes(el) ? fadeIn(el) : fadeOut(el));
  randomTimeout = setTimeout(runRandom, currentSpeedValue * 1000);
}

document.getElementById('timerBtn').onclick = () => {
  initAudioContext();
  const currentLang = langOrder[langIdx];
  if(timerInterval) { 
    clearInterval(timerInterval); timerInterval=null; 
    document.getElementById('timerDisplay').innerText = "00:00"; 
    document.getElementById('timerBtn').innerText = uiTL[currentLang].start; 
  } else {
    timeLeft = currentSleepValue;
    document.getElementById('timerBtn').innerText = uiTL[currentLang].stop;
    timerInterval = setInterval(() => {
      timeLeft--;
      let m = Math.floor(timeLeft/60), s = timeLeft%60;
      document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      if(timeLeft<=0) { 
          clearInterval(timerInterval); timerInterval = null;
          audioElements.forEach(fadeOut); randomActive=false; 
          document.getElementById('timerBtn').innerText = uiTL[currentLang].start; 
      }
    }, 1000);
  }
};

const visCanvas = document.getElementById('vis'); const visCtx = visCanvas.getContext('2d');
visCanvas.width = innerWidth; visCanvas.height = innerHeight;
const header = document.getElementById('mainHeader');

function animate(){
  visCtx.clearRect(0,0,innerWidth,innerHeight);
  let globalVol = 0;

  if (globalAnalyser && dataArray) {
    globalAnalyser.getByteFrequencyData(dataArray);
    globalVol = getAverageVolume(dataArray);
    let pulsateSpread = globalVol / 3;
    let brightness = globalVol / 250;
    header.style.filter = `drop-shadow(0 0 ${10 + pulsateSpread}px rgba(138, 43, 226, ${0.3 + brightness}))`;
  }

  audioElements.forEach(el => {
    let currentTileVol = 0;
    let effectiveVol = el.gainNode ? el.gainNode.gain.value : (el.targetVol > 0 ? 0.6 : 0);
    
    if(el.analyser && el.tileDataArray && effectiveVol > 0.01) {
        el.analyser.getByteFrequencyData(el.tileDataArray);
        currentTileVol = getAverageVolume(el.tileDataArray);
        let barWidth = (currentTileVol / 150) * 100;
        el.visBar.style.width = `${Math.min(100, barWidth)}%`;
        let brightness = 0.15 + (currentTileVol / 255) * 0.6;
        el.btn.style.backgroundColor = el.color.replace('0.5', brightness.toFixed(2));
        
        let spawnChance = 0.05 + (currentTileVol / 255) * 0.4;
        if(Math.random() < spawnChance){
          particles.push({ 
            x: Math.random()*innerWidth, 
            y: innerHeight+10, 
            r: ((currentTileVol / 50) + 5) * 2,
            s: ((0.1 + Math.random()*0.5) / 2 + (currentTileVol / 100)) / 3, 
            al: 0.9, 
            c: el.color 
          });
        }
    } else {
        if(!el.btn.classList.contains('active')) el.btn.style.backgroundColor = 'rgba(255,255,255,0.15)';
    }
  });

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.y -= p.s; p.al -= 0.0005;
    visCtx.beginPath(); visCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    let baseColor = p.c.split(',').slice(0, 3).join(',');
    visCtx.fillStyle = `${baseColor},${p.al.toFixed(2)})`;
    visCtx.fill();
    if(p.al <= 0 || p.y < -50) particles.splice(i, 1);
  }
  requestAnimationFrame(animate);
}
animate();

function cycleLang() {
  langIdx = (langIdx + 1) % langOrder.length;
  updateUI();
}

function updateUI() {
  const currentLang = langOrder[langIdx];
  const t = uiTL[currentLang];
  document.getElementById('title').innerText = t.title;
  document.getElementById('langBtn').innerText = t.code;
  document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
  document.getElementById('timerBtn').innerText = timerInterval ? t.stop : t.start;
  document.getElementById('hPlay').innerText = t.hPlay;
  document.getElementById('hPlayD').innerText = t.hPlayD;
  document.getElementById('hTiles').innerText = t.hTiles;
  document.getElementById('hTilesD').innerText = t.hTilesD;
  document.getElementById('hTimer').innerText = t.hTimer;
  document.getElementById('hTimerD').innerText = t.hTimerD;
  document.getElementById('helpClose').innerText = t.close;
  audioElements.forEach((el, i) => { 
    el.btn.querySelector('span').innerText = sounds[i].name[currentLang]; 
  });
}

document.getElementById('helpBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('helpModal').style.display='flex'; };
document.getElementById('closeHelp').onclick = () => { document.getElementById('helpModal').style.display='none'; };
document.getElementById('langBtn').onclick = cycleLang;

// Закрытие при клике мимо
window.onclick = (e) => {
    if (!e.target.matches('.select-trigger')) {
        document.getElementById('speedDropdown').classList.remove('open');
        document.getElementById('sleepDropdown').classList.remove('open');
    }
};
window.onresize = () => { res(); visCanvas.width=innerWidth; visCanvas.height=innerHeight; };
updateUI();
</script>
</body>
</html>
