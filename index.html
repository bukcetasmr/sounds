<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUCKET ASMR</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
  }

  .overlay {
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.6);
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
    font-size: 28px;
    color: #ffb400;
    text-shadow: 0 0 10px #ffb400;
    text-align: center;
  }

  .lang-buttons {
    margin-bottom: 20px;
  }

  .lang-buttons button {
    margin: 0 5px;
    padding: 8px 14px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    backdrop-filter: blur(5px);
  }

  .lang-buttons button:hover {
    background: rgba(255,255,255,0.4);
  }

  .sound-grid {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 20px;
    padding-bottom: 20px;
    width: 100%;
    justify-content: center;
  }

  .sound-track {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 70px;
  }

  .volume-slider {
    writing-mode: bt-lr; /* вертикальный */
    -webkit-appearance: slider-vertical;
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    transform: rotate(0deg); /* перевернут низ-так = тихо, верх = громко */
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffb400;
    box-shadow: 0 0 5px #ffb400;
    cursor: pointer;
  }

  .volume-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffb400;
    cursor: pointer;
    box-shadow: 0 0 5px #ffb400;
  }

  .sound-button {
    width: 70px;
    height: 40px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.3);
    color: white;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(6px);
    transition: 0.2s;
  }

  .sound-button.active {
    background: rgba(74, 222, 128, 0.7);
    box-shadow: 0 0 10px #4ade80;
  }

  canvas {
    position: fixed;
    top:0; left:0;
    z-index: 0;
  }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
  <h1 id="title">BUCKET ASMR</h1>
  <div class="lang-buttons">
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('ru')">Русский</button>
    <button onclick="setLang('uk')">Українська</button>
  </div>

  <div class="sound-grid" id="soundGrid"></div>
</div>

<canvas id="vis"></canvas>

<script>
const sounds = [
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/purplebrush.wav', name: {en:'Purple Brush', ru:'Пурпл Браш', uk:'Пурпл Браш'}},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/choko.wav', name: {en:'Choko', ru:'Чоко', uk:'Чоко'}},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/strawberry.wav', name: {en:'Strawberry', ru:'Клубника', uk:'Полуниця'}},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/wax.wav', name: {en:'Wax', ru:'Воск', uk:'Віск'}},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/woodandrocks.wav', name: {en:'Wood & Rocks', ru:'Дерево и камни', uk:'Дерево і камені'}},
  {file: 'https://raw.githubusercontent.com/bukcetasmr/sounds/main/bigpink.wav', name: {en:'Big Pink', ru:'Биг Пинк', uk:'Біг Пінк'}}
];

let lang = 'en';
const grid = document.getElementById('soundGrid');
const audioElements = [];

function setLang(l){
  lang = l;
  document.getElementById('title').innerText = lang==='en'?'BUCKET ASMR':(lang==='ru'?'ВЕДРО АСМР':'ВIДРО АСМР');
  audioElements.forEach((a,i)=>{
    a.btn.innerText = sounds[i].name[lang];
  });
}

sounds.forEach((s,i)=>{
  const track = document.createElement('div');
  track.className = 'sound-track';
  track.innerHTML = `
    <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    <button class="sound-button">${s.name[lang]}</button>
  `;
  grid.appendChild(track);

  const audio = new Audio(s.file);
  audio.loop = true;
  audio.volume = 0.5;

  const slider = track.querySelector('.volume-slider');
  const btn = track.querySelector('.sound-button');

  slider.addEventListener('input', e => { audio.volume = e.target.value; });
  btn.addEventListener('click', e=>{
    if(audio.paused){
      audio.play();
      btn.classList.add('active');
    } else {
      audio.pause();
      btn.classList.remove('active');
    }
  });

  audioElements.push({audio, btn, slider});
});

// визуализация
const canvas = document.getElementById('vis');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  audioElements.forEach(a=>{
    if(!a.audio.paused){
      const x = Math.random()*canvas.width;
      const y = Math.random()*canvas.height;
      const radius = a.audio.volume*60 + Math.random()*20;
      ctx.beginPath();
      ctx.arc(x,y,radius,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a.audio.volume*0.3})`;
      ctx.fill();
    }
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
