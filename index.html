<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #050505;
    transition: background 1.5s ease;
    font-family: Arial, sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.fancy-bg {
    background: radial-gradient(circle at center, #0a0a1f 0%, #050505 100%);
  }

  .vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7) 110%);
    pointer-events: none; z-index: 4;
  }

  .container { 
    position: relative; z-index: 10; 
    display:flex; flex-direction: column; align-items:center; 
    padding:20px; height: 100vh; box-sizing: border-box; 
  }

  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:26px; color:#ffb400; text-shadow:0 0 15px rgba(255,180,0,0.4); letter-spacing: 1px; }
  
  .controls > button, #helpBtn, .lang-btn-ui, .select-trigger, .custom-dropdown button { 
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.08);
    border: 0.5px solid rgba(255, 255, 255, 0.2) !important;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    color: white; cursor: pointer; font-weight: bold; transition: all 0.3s ease;
  }

  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { padding:8px 14px; border-radius:12px; font-size: 13px; }
  
  #randomBtn { background: rgba(138, 43, 226, 0.3); border-color: rgba(138, 43, 226, 0.5) !important; }
  #repairBtn { background: rgba(255, 50, 50, 0.2); border-color: rgba(255, 50, 50, 0.4) !important; color: #ffcccc; }
  #sleepBtn.active { background: rgba(40, 50, 100, 0.6); border-color: rgba(100, 150, 255, 0.5) !important; }

  .sound-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
    gap: 15px; width: 100%; max-width: 600px; padding: 10px; overflow-y: auto; flex-grow: 1; z-index: 5;
  }

  .sound-button { 
    aspect-ratio: 1 / 1; border-radius: 22px; 
    background: rgba(255,255,255,0.03); color:rgba(255,255,255,0.25); font-weight:bold; 
    cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; 
    backdrop-filter: blur(10px); transition: transform 0.1s linear, background 0.4s ease, border 0.4s ease, color 0.4s ease;
    font-size: 11px; text-align: center;
    border: 0.5px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;
    padding: 5px;
  }

  .sound-button.active { 
    color: white; border: 0.5px solid rgba(255,255,255,0.4);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .mute-btn {
    position: absolute; top: 5px; right: 5px; width: 22px; height: 22px;
    background: rgba(255,255,255,0.1); border-radius: 50%; display: none;
    align-items: center; justify-content: center; font-size: 10px; color: white;
    z-index: 20; border: 0.5px solid rgba(255,255,255,0.2);
  }
  .sound-button.active .mute-btn { display: flex; }
  .mute-btn.muted { background: #ff5050; border-color: #ff5050; }

  .sound-button.loading { animation: pulse-load 1.2s infinite; color: #ffb400; }
  .sound-button.broken { border: 2px solid rgba(255, 50, 50, 0.6) !important; color: #ff5050; }

  @keyframes pulse-load {
    0%, 100% { background: rgba(255, 180, 0, 0.05); }
    50% { background: rgba(255, 180, 0, 0.2); }
  }

  .tile-vis {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 4px; background: rgba(255,255,255,0.15);
    border-radius: 2px; overflow: hidden; display: none;
  }
  .tile-vis-bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; }
  .sound-button.active .tile-vis { display: block; }

  .custom-select-container { position: relative; }
  .custom-dropdown {
    display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(30, 30, 45, 0.95); border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px; flex-direction: column; z-index: 3000; overflow: hidden; min-width: 120px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(15px);
  }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button { padding: 12px; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); border-radius: 0; backdrop-filter: none; background: transparent; }
  .custom-dropdown button:last-child { border-bottom: none; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; transition: opacity 1.5s ease; }
  canvas.hidden { opacity: 0; }
  
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(8px);
  }
  .modal-content {
    background: rgba(20, 20, 35, 0.95); border: 1px solid #ffb400;
    padding: 30px; border-radius: 24px; text-align: center; color: white; max-width: 85%;
    box-shadow: 0 0 30px rgba(255, 180, 0, 0.2); position: relative;
  }
  .hint-text { font-size: 13px; color: #aaa; margin-top: 15px; display: block; line-height: 1.4; }
  
  .lang-btn-ui { padding: 8px 12px; border-radius: 10px; font-size: 12px; }
</style>
</head>
<body class="fancy-bg">

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>
<div class="vignette"></div>

<div id="welcomeModal" class="modal" style="display: flex;">
  <div class="modal-content">
    <div style="position: absolute; top: 15px; right: 15px; scale: 0.9;">
        <button class="lang-btn-ui lang-switcher-btn">EN</button>
    </div>
    <h2 style="color: #ffb400; margin-top: 0;">BUCKET ASMR</h2>
    <p id="welcomeText" style="line-height: 1.5;"></p>
    <span id="repairHint" class="hint-text"></span>
    <button style="background:#ffb400; border:none; padding:12px 30px; border-radius:12px; font-weight:bold; cursor:pointer; color:black; margin-top: 20px;" id="closeWelcome">OK</button>
  </div>
</div>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <div id="helpBtn" style="width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;" onclick="showHelp()">?</div>
    <button id="langBtn" class="lang-btn-ui lang-switcher-btn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="sleepBtn">Sleep: OFF</button>
    <button id="repairBtn">REPAIR</button>
    <div class="custom-select-container">
        <div class="select-trigger" id="speedTrigger" style="padding: 8px 14px; border-radius: 12px; min-width: 90px; text-align: center;">Fast</div>
        <div id="speedDropdown" class="custom-dropdown">
            <button onclick="setSpeed(11, 'fast')" data-speed="fast"></button>
            <button onclick="setSpeed(24, 'medium')" data-speed="medium"></button>
            <button onclick="setSpeed(46, 'slow')" data-speed="slow"></button>
        </div>
    </div>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null;
let currentSpeedValue = 11, currentSpeedKey = 'fast', langIdx = 0, randomActive = false, nextCycleTimeout = null;
let sleepMode = false, animationId = null;
let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
let idleTimer = null; // Таймер бездействия

const langOrder = ['en', 'uk', 'ru'];
let audioElements = [], particles = [];

// Сброс таймера бездействия при движении или касании
function resetIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(startSmartAutoLoad, 1000); // 1 секунда бездействия
}

window.addEventListener('mousemove', e => {
    targetX = (e.clientX - innerWidth/2) / 60; // Чувствительность уменьшена в 2 раза
    targetY = (e.clientY - innerHeight/2) / 60;
    resetIdleTimer();
});
window.addEventListener('touchstart', resetIdleTimer);

// Система умной автозагрузки
function startSmartAutoLoad() {
    const nextToLoad = audioElements.find(el => !el.isLoaded && !el.btn.classList.contains('loading'));
    if (nextToLoad) {
        smartLoad(nextToLoad).then(() => {
            // После успешной загрузки одного, планируем следующий через небольшую паузу
            idleTimer = setTimeout(startSmartAutoLoad, 200);
        });
    }
}

const sounds = [
  {file:'purplebrush.mp3', name:{en:'Purple Brush', ru:'Фиолетовая кисть', uk:'Фіолетовий пензель'}, color:'rgba(150,100,255,0.5)'},
  {file:'choko.mp3', name:{en:'Choco', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.5)'},
  {file:'carrot.mp3', name:{en:'Carrot', ru:'Морковь', uk:'Морква'}, color:'rgba(255,140,0,0.5)'},
  {file:'oldphone.mp3', name:{en:'Old Phone', ru:'Телефон', uk:'Телефон'}, color:'rgba(50,50,50,0.5)'},
  {file:'greybrush.mp3', name:{en:'Grey Brush', ru:'Серая кисть', uk:'Сірий пензель'}, color:'rgba(140,140,140,0.5)'},
  {file:'pinksoftbrush.mp3', name:{en:'Soft Brush', ru:'Мягкая кисть', uk:'М’який пензель'}, color:'rgba(255,182,193,0.5)'},
  {file:'strawberry.mp3', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.5)'},
  {file:'wax.mp3', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.5)'},
  {file:'wood.mp3', name:{en:'Wood', ru:'Дерево', uk:'Дерево'}, color:'rgba(255,255,0,0.5)'}
];

const uiTL = {
  en: { code: "EN", title: "BUCKET ASMR", play: "Play", pause: "Pause", repair: "REPAIR", welcome: "Press OK and Play to activate sounds.", repairHint: "Press REPAIR if sounds fail to load.", sleep: "Sleep", speeds: { slow: "Slow", medium: "Medium", fast: "Fast" } },
  ru: { code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", repair: "ЧИНИТЬ", welcome: "Нажмите OK и Играть для активации звуков.", repairHint: "Нажмите ЧИНИТЬ, если звуки не загрузились.", sleep: "Сон", speeds: { slow: "Медленно", medium: "Средне", fast: "Быстро" } },
  uk: { code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", repair: "ЛАГОДИТИ", welcome: "Натисніть OK та Грати для активації звуків.", repairHint: "Натисніть ЛАГОДИТИ, если звуки не завантажились.", sleep: "Сон", speeds: { slow: "Повільно", medium: "Середньо", fast: "Швидко" } }
};

const grid = document.getElementById('soundGrid');
sounds.forEach((s) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<div class="mute-btn">🔊</div><span>${s.name['en']}</span><div class="tile-vis"><div class="tile-vis-bar"></div></div>`;
  grid.appendChild(btn);
  
  const audio = new Audio();
  audio.loop = true; audio.crossOrigin = "anonymous"; audio.setAttribute('playsinline', '');
  
  const state = { 
    audio, btn, color: s.color, fileName: s.file, 
    visBar: btn.querySelector('.tile-vis-bar'), muteBtn: btn.querySelector('.mute-btn'),
    targetVol: 0, source: null, isLoaded: false, isMuted: false 
  };

  state.muteBtn.onclick = (e) => {
    e.stopPropagation();
    state.isMuted = !state.isMuted;
    state.muteBtn.classList.toggle('muted', state.isMuted);
    state.muteBtn.innerText = state.isMuted ? '🔇' : '🔊';
    if (state.gainNode) state.gainNode.gain.setTargetAtTime(state.isMuted ? 0 : 0.6, audioCtx.currentTime, 0.2);
  };

  btn.onclick = () => { 
    initAudioContext(); 
    if(!state.isLoaded) { smartLoad(state); return; }
    state.targetVol === 0 ? fadeIn(state) : fadeOut(state); 
  };
  audioElements.push(state);
});

async function smartLoad(state) {
    if (state.isLoaded) return;
    state.btn.classList.add('loading');
    const url = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${state.fileName}?v=${Math.random()}`;
    return new Promise((resolve) => {
        state.audio.src = url;
        state.audio.load();
        state.audio.oncanplaythrough = () => { 
            state.btn.classList.remove('loading', 'broken'); 
            state.isLoaded = true; 
            resolve();
        };
        state.audio.onerror = () => { 
            state.btn.classList.add('broken'); 
            state.btn.classList.remove('loading'); 
            resolve();
        };
    });
}

function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.fftSize = 64;
  globalAnalyser.connect(audioCtx.destination);
}

function fadeIn(el) {
  el.audio.play().then(() => {
    if (!el.source) {
      el.source = audioCtx.createMediaElementSource(el.audio);
      el.gainNode = audioCtx.createGain();
      el.analyser = audioCtx.createAnalyser();
      el.analyser.fftSize = 32;
      el.tileDataArray = new Uint8Array(el.analyser.frequencyBinCount);
      el.source.connect(el.gainNode);
      el.gainNode.connect(el.analyser);
      el.analyser.connect(globalAnalyser);
    }
    el.btn.classList.add('active');
    el.targetVol = 0.6;
    el.gainNode.gain.setTargetAtTime(el.isMuted ? 0 : 0.6, audioCtx.currentTime, 0.4);
  }).catch(() => {});
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  el.targetVol = 0;
  if(el.gainNode) el.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.8);
  setTimeout(() => { if(el.targetVol === 0) el.audio.pause(); }, 1000);
}

const sCan = document.getElementById('stars'), sCtx = sCan.getContext('2d');
const vCan = document.getElementById('vis'), vCtx = vCan.getContext('2d');
function res() { sCan.width = vCan.width = innerWidth; sCan.height = vCan.height = innerHeight; }
window.onresize = res; res();
const starsArr = Array.from({length:80}, () => ({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.5, a:Math.random(), t:Math.random()*0.01, z: Math.random()*2 }));

function animate(){
  sCtx.clearRect(0,0,innerWidth,innerHeight);
  vCtx.clearRect(0,0,innerWidth,innerHeight);

  if (!sleepMode) {
      mouseX += (targetX - mouseX) * 0.05;
      mouseY += (targetY - mouseY) * 0.05;
      
      starsArr.forEach(s=>{ 
        s.a+=s.t; if(s.a>1||s.a<0.1) s.t*=-1; 
        let px = s.x + (mouseX * s.z);
        let py = s.y + (mouseY * s.z);
        sCtx.beginPath(); sCtx.arc(px, py, s.r, 0, Math.PI*2); 
        sCtx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`; sCtx.fill(); 
      });
  }

  audioElements.forEach(el => {
    if(el.analyser && el.btn.classList.contains('active')) {
        el.analyser.getByteFrequencyData(el.tileDataArray);
        let vol = 0; for(let i=0; i<el.tileDataArray.length; i++) vol += el.tileDataArray[i];
        vol /= el.tileDataArray.length;

        if (sleepMode) {
            el.visBar.style.width = `0%`;
            el.btn.style.transform = `scale(1)`;
            el.btn.style.backgroundColor = 'rgba(255,255,255,0.08)';
            el.btn.style.borderColor = `rgba(255,255,255,0.2)`;
        } else {
            el.visBar.style.width = `${Math.min(100, (vol/150)*100)}%`;
            let scale = 1 + (vol / 1200);
            el.btn.style.transform = `scale(${scale})`;
            el.btn.style.backgroundColor = el.color.replace('0.5', (0.1 + (vol/255)*0.5).toFixed(2));
            el.btn.style.borderColor = `rgba(255,255,255,${0.1 + (vol/255)*0.4})`;
            
            if(Math.random() < (0.02 + vol/500)) {
                particles.push({ x: Math.random()*innerWidth, y: innerHeight+10, r: ((vol/60)+8)*2, s: 0.2 + (vol/500), al: 0.6, c: el.color, z: 2 + Math.random()*3 });
            }
        }
    } else {
        el.btn.style.transform = `scale(1)`;
        if(el.isLoaded) el.btn.style.backgroundColor = 'rgba(255,255,255,0.03)';
    }
  });

  if (!sleepMode) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.y -= p.s; p.al -= 0.001;
        let px = p.x + (mouseX * p.z);
        let py = p.y + (mouseY * p.z);
        vCtx.beginPath(); vCtx.arc(px, py, p.r, 0, Math.PI*2);
        let g = vCtx.createRadialGradient(px, py, 0, px, py, p.r);
        let c = p.c.split(',').slice(0,3).join(',');
        g.addColorStop(0, `${c}, ${p.al})`); g.addColorStop(1, `${c}, 0)`);
        vCtx.fillStyle = g; vCtx.fill();
        if(p.al <= 0 || p.y < -50) particles.splice(i, 1);
      }
  }
  animationId = requestAnimationFrame(animate);
}
animationId = requestAnimationFrame(animate);

function toggleSleep() {
    sleepMode = !sleepMode;
    const canvases = [document.getElementById('stars'), document.getElementById('vis')];
    if (sleepMode) {
        canvases.forEach(c => c.classList.add('hidden'));
        document.body.classList.remove('fancy-bg');
        document.body.style.backgroundColor = '#000';
    } else {
        canvases.forEach(c => c.classList.remove('hidden'));
        document.body.classList.add('fancy-bg');
        document.body.style.backgroundColor = '';
    }
    updateUI();
}

function runRandom() { 
  if(!randomActive) return; 
  let readySounds = audioElements.filter(el => el.isLoaded);
  if (readySounds.length === 0) { nextCycleTimeout = setTimeout(runRandom, 1000); return; }
  let count = Math.floor(Math.random() * 2) + 1;
  let toPlay = readySounds.sort(() => 0.5 - Math.random()).slice(0, count);
  const allMuted = toPlay.every(el => el.isMuted);
  if(allMuted) {
      const audiblePool = readySounds.filter(el => !el.isMuted);
      if(audiblePool.length > 0) {
          const extraSound = audiblePool[Math.floor(Math.random() * audiblePool.length)];
          if(!toPlay.includes(extraSound)) toPlay.push(extraSound);
      }
  }
  audioElements.forEach(el => toPlay.includes(el) ? fadeIn(el) : fadeOut(el));
  nextCycleTimeout = setTimeout(runRandom, currentSpeedValue * 1000); 
}

function setSpeed(v, key) { 
    currentSpeedValue = v; currentSpeedKey = key;
    updateUI();
    document.getElementById('speedDropdown').classList.remove('open'); 
    if(randomActive){ clearTimeout(nextCycleTimeout); runRandom(); } 
}

function updateUI(){
  const t = uiTL[langOrder[langIdx]];
  document.getElementById('title').innerText = t.title;
  document.querySelectorAll('.lang-switcher-btn').forEach(btn => btn.innerText = t.code);
  document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
  document.getElementById('repairBtn').innerText = t.repair;
  document.getElementById('welcomeText').innerText = t.welcome;
  document.getElementById('repairHint').innerText = t.repairHint;
  document.getElementById('speedTrigger').innerText = t.speeds[currentSpeedKey];
  document.getElementById('sleepBtn').innerText = `${t.sleep}: ${sleepMode ? 'ON' : 'OFF'}`;
  document.getElementById('sleepBtn').classList.toggle('active', sleepMode);
  
  document.querySelectorAll('#speedDropdown button').forEach(btn => {
      const key = btn.getAttribute('data-speed');
      btn.innerText = t.speeds[key];
  });

  audioElements.forEach((el, i) => el.btn.querySelector('span').innerText = sounds[i].name[langOrder[langIdx]]);
}

document.getElementById('randomBtn').onclick = () => { initAudioContext(); randomActive = !randomActive; if(randomActive) runRandom(); else { clearTimeout(nextCycleTimeout); audioElements.forEach(fadeOut); } updateUI(); };
document.getElementById('sleepBtn').onclick = toggleSleep;
document.getElementById('repairBtn').onclick = () => location.reload();
document.getElementById('speedTrigger').onclick = (e) => { e.stopPropagation(); document.getElementById('speedDropdown').classList.toggle('open'); };
document.querySelectorAll('.lang-switcher-btn').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); langIdx = (langIdx + 1) % 3; updateUI(); }; });
document.getElementById('closeWelcome').onclick = () => { 
    document.getElementById('welcomeModal').style.display='none'; 
    initAudioContext(); 
    startSmartAutoLoad(); // Запуск системы автозагрузки при закрытии модалки
};
window.onclick = () => document.getElementById('speedDropdown').classList.remove('open');
function showHelp() { document.getElementById('welcomeModal').style.display = 'flex'; }

updateUI();
</script>
</body>
</html>
