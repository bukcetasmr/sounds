// --- WAKE LOCK (ЗАПРЕТ БЛОКИРОВКИ ЭКРАНА) ---
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake Lock is active');
      wakeLock.addEventListener('release', () => {
        console.log('Wake Lock released');
      });
    }
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
}

// Переподключение замка при возвращении во вкладку
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    await requestWakeLock();
  }
});

function updateConnections() {
    if (!presenceRef) {
        presenceRef = connectionsRef.push(true);
        presenceRef.onDisconnect().remove();
    }
    const fetchCount = () => {
        connectionsRef.once('value', snap => {
            document.getElementById('online-count').innerText = snap.numChildren() || 1;
        });
    };
    fetchCount();
    if(liveInterval) clearInterval(liveInterval);
    liveInterval = setInterval(fetchCount, 60000); 
}

};

let audioElements = [], randomActive = false, sleepMode = false, langIdx = 0;
let currentSpeedValue = 34, nextCycleTimeout = null; 
const langOrder = ['en', 'pt', 'uk', 'ru'];

function checkPass() {
  if (btoa(document.getElementById('pass-input').value) === 'YnVja2V0MjAyNg==') {
    document.getElementById('pass-screen').classList.add('hidden');
    document.getElementById('welcomeModal').style.display = 'flex';
    updateConnections();
    requestWakeLock(); // Активируем запрет блокировки
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}

document.getElementById('pass-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkPass(); });

function switchTab(event, tabId) {
    document.querySelectorAll('.help-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

function showHelp() { document.getElementById('welcomeModal').style.display = 'flex'; }

const grid = document.getElementById('soundGrid');
sounds.forEach((s, idx) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<div class="mute-btn">🔊</div><span>${s.name['en']}</span>`;
  grid.appendChild(btn);

  const audio = new Audio();
  audio.loop = true;
  audio.crossOrigin = "anonymous";
  audio.setAttribute('playsinline', '');
  
  const state = { audio, btn, active: false, muted: false, fileName: s.file, color: s.color, loaded: false };

  btn.onclick = () => {
    if (!state.loaded) {
        state.audio.src = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${state.fileName}`;
        state.audio.load();
        state.loaded = true;
        btn.classList.add('ready');
    }
    state.active ? fadeOut(state) : fadeIn(state);
  };

  btn.querySelector('.mute-btn').onclick = (e) => {
    e.stopPropagation();
    state.muted = !state.muted;
    state.audio.volume = state.muted ? 0 : 0.6;
    btn.querySelector('.mute-btn').classList.toggle('muted', state.muted);
  };
  audioElements.push(state);
});

function fadeIn(el) {
  el.active = true; el.btn.classList.add('active'); el.btn.style.backgroundColor = el.color + "44";
  el.audio.volume = 0; el.audio.play().catch(()=>{});
  let v = 0; const interval = setInterval(() => {
    if (v < 0.6 && !el.muted) { v += 0.05; el.audio.volume = Math.min(v, 0.6); } 
    else { clearInterval(interval); }
  }, 50);
}

function fadeOut(el) {
  el.active = false; el.btn.classList.remove('active'); el.btn.style.backgroundColor = "";
  let v = el.audio.volume; const interval = setInterval(() => {
    if (v > 0.05) { v -= 0.05; el.audio.volume = v; } 
    else { el.audio.volume = 0; el.audio.pause(); clearInterval(interval); }
  }, 50);
}

function updateUI() {
  const t = uiTL[langOrder[langIdx]];
  document.getElementById('title').innerText = t.title;
  document.querySelectorAll('.lang-switcher-btn').forEach(btn => btn.innerText = t.code);
  document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
  document.getElementById('repairBtn').innerText = t.repair;
  document.getElementById('sleepBtn').innerText = `${t.sleep}: ${sleepMode ? 'ON' : 'OFF'}`;
  
  let speedKey = (currentSpeedValue === 22) ? 'fast' : (currentSpeedValue === 52) ? 'slow' : 'medium';
  document.getElementById('speedTrigger').innerText = t.speeds[speedKey];
  document.getElementById('spFast').innerText = t.speeds.fast;
  document.getElementById('spMed').innerText = t.speeds.medium;
  document.getElementById('spSlow').innerText = t.speeds.slow;

  document.getElementById('tabTitleFeatures').innerText = t.tabFeatures;
  document.getElementById('tabTitleGuide').innerText = t.tabGuide;
  document.getElementById('featuresList').innerHTML = t.features.map(item => `<li>${item}</li>`).join('');
  document.getElementById('guideList').innerHTML = t.guide.map(item => `<li>${item}</li>`).join('');

  audioElements.forEach((el, i) => el.btn.querySelector('span').innerText = sounds[i].name[langOrder[langIdx]]);
}

document.getElementById('randomBtn').onclick = () => {
  randomActive = !randomActive;
  if (randomActive) { runRandom(); } 
  else { clearTimeout(nextCycleTimeout); audioElements.forEach(el => { if(el.active) fadeOut(el); }); }
  updateUI();
};

function runRandom() {
  if (!randomActive) return;
  const pool = audioElements.filter(el => el.loaded);
  if (pool.length === 0) { 
    audioElements.forEach(el => el.btn.click());
    nextCycleTimeout = setTimeout(runRandom, 2000);
    return;
  }
  const count = Math.floor(Math.random() * 2) + 1;
  const toPlay = pool.sort(() => 0.5 - Math.random()).slice(0, count);
  audioElements.forEach(el => {
    if (toPlay.includes(el)) { if(!el.active) fadeIn(el); } 
    else { if(el.active) fadeOut(el); }
  });
  nextCycleTimeout = setTimeout(runRandom, currentSpeedValue * 1000);
}

function setSpeed(v, label) {
    currentSpeedValue = v;
    document.getElementById('speedDropdown').classList.remove('open');
    updateUI();
    if(randomActive) { clearTimeout(nextCycleTimeout); runRandom(); }
}

document.getElementById('speedTrigger').onclick = () => document.getElementById('speedDropdown').classList.toggle('open');
document.getElementById('repairBtn').onclick = () => location.reload();
document.getElementById('closeWelcome').onclick = () => { 
    document.getElementById('welcomeModal').style.display = 'none';
    requestWakeLock(); // Активируем замок при старте
};

document.querySelectorAll('.lang-switcher-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); langIdx = (langIdx + 1) % 4; updateUI(); };
});

document.getElementById('sleepBtn').onclick = () => {
    sleepMode = !sleepMode;
    document.body.style.background = sleepMode ? "#000" : "";
    document.getElementById('stars').style.opacity = sleepMode ? "0" : "1";
    document.getElementById('sleepBtn').classList.toggle('active', sleepMode);
    
    if (sleepMode) {
      if(presenceRef) presenceRef.remove();
      presenceRef = null;
      if(liveInterval) clearInterval(liveInterval);
      firebase.database().goOffline();
      document.getElementById('online-count').innerText = "ECO";
    } else {
      firebase.database().goOnline();
      updateConnections();
    }
    updateUI();
};

const canvas = document.getElementById('stars'), ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.onresize = resize; resize();
const starsArr = Array.from({length: 70}, () => ({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5, a: Math.random(), s: Math.random() * 0.01 }));
function draw() {
  ctx.clearRect(0,0,innerWidth,innerHeight);
  if(!sleepMode) {
    starsArr.forEach(s => {
      s.a += s.s; if(s.a > 1 || s.a < 0) s.s *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`; ctx.fill();
    });
  }
  requestAnimationFrame(draw);
}
draw();
updateUI();
</script>
</body>
