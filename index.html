<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUCKET ASMR</title>
<style>
body, html {
  margin: 0; padding: 0; height: 100%;
  background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
  font-family: Arial, sans-serif; color: white; overflow: hidden;
}
body::after {
  content: "";
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: transparent url('https://raw.githubusercontent.com/andreygolikov/star-background/main/stars.png') repeat top center;
  z-index:0; pointer-events:none;
}
.overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:1; }
.container { position: relative; z-index:2; display:flex; flex-direction: column; align-items:center; padding:20px; }
.title-bar { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
h1 { margin:0; font-size:28px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
.lang-select { position: relative; }
.lang-select button { padding:5px 10px; border-radius:12px; border:none; background: rgba(255,255,255,0.2); color:white; cursor:pointer; font-weight:bold; backdrop-filter: blur(5px); transition:0.2s; }
.lang-select button:hover { background: rgba(255,255,255,0.4); }
.lang-dropdown { display:none; position:absolute; top:35px; left:0; background: rgba(0,0,0,0.85); border-radius:12px; overflow:hidden; flex-direction:column; z-index:9999; }
.lang-dropdown button { padding:8px 14px; border:none; background:transparent; color:white; cursor:pointer; font-weight:bold; text-align:left; transition:0.2s; }
.lang-dropdown button:hover { background: rgba(255,255,255,0.2); }
.controls { margin-bottom:20px; display:flex; gap:10px; flex-wrap: wrap; align-items:center; }
.controls button, .controls select { padding:8px 14px; border:none; border-radius:12px; background: rgba(255,255,255,0.2); color:black; cursor:pointer; font-weight:bold; transition:0.2s; backdrop-filter: blur(5px); }
.controls button:hover, .controls select:hover { background: rgba(255,255,255,0.4); }
.sound-grid { display:flex; flex-wrap: nowrap; overflow-x:auto; overflow-y:hidden; gap:20px; padding-bottom:20px; width:100%; justify-content:center; -webkit-overflow-scrolling: touch; box-sizing: border-box; scroll-behavior: smooth; }
@media (max-width: 768px) {
  .sound-grid { justify-content:flex-start; padding-left:20px; padding-right:20px; }
}
.sound-grid::-webkit-scrollbar { height: 8px; }
.sound-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
.sound-track { display:flex; flex-direction: column; align-items:center; flex:0 0 70px; width:70px; }
.volume-slider { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width:100%; height:150px; margin-bottom:10px; background: rgba(255,255,255,0.2); border-radius:8px; outline:none; cursor:pointer; }
.volume-slider::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#ffb400; box-shadow:0 0 5px #ffb400; cursor:pointer; }
.volume-slider::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:#ffb400; cursor:pointer; box-shadow:0 0 5px #ffb400; }
.sound-button { width:70px; height:40px; border:none; border-radius:12px; background: rgba(255,255,255,0.3); color:white; font-weight:bold; cursor:pointer; text-align:center; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(6px); transition:0.2s; }
.sound-button.active { box-shadow: 0 0 10px #fff; }
.timer-display { color: #9b59b6; font-weight:bold; font-size:16px; margin-left:10px; }
canvas { position: fixed; top:0; left:0; z-index:0; }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <div class="lang-select">
      <button id="langBtn">Language</button>
      <div class="lang-dropdown" id="langDropdown">
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('ru')">Русский</button>
        <button onclick="setLang('uk')">Українська</button>
      </div>
    </div>
  </div>
  <div class="controls">
    <button id="randomBtn">Random OFF</button>
    <select id="randomInterval">
      <option value="30">30 sec</option>
      <option value="60">1 m</option>
      <option value="120">2 m</option>
      <option value="300">5 m</option>
      <option value="0">Fast</option>
    </select>
    <select id="autoOffSelect">
      <option value="120">Timer: 2 min</option>
      <option value="300">Timer: 10 min</option>
      <option value="1200">Timer: 30 min</option>
      <option value="3600">Timer: 1 hour</option>
      <option value="28800">Timer: 8 hours</option>
    </select>
    <button id="timerBtn">Start</button>
    <span class="timer-display" id="timerDisplay">00:00</span>
  </div>
  <div class="sound-grid" id="soundGrid"></div>
</div>
<canvas id="vis"></canvas>
<script>
const sounds = [
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/purplebrush.wav', name:{en:'Brush', ru:'Кисть', uk:'Пензель'}, color:'rgba(150,100,255,0.2)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/choko.wav', name:{en:'Choko', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.2)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/strawberry.wav', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.2)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/wax.wav', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.2)'},
  {file:'https://raw.githubusercontent.com/bukcetasmr/sounds/main/woodandrocks.wav', name:{en:'Wood & Rocks', ru:'Дерево и камни', uk:'Дерево і камені'}, color:'rgba(255,255,0,0.2)'}
];

let lang='en', audioElements=[], particles=[];

const canvas=document.getElementById('vis'), ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let pointer={x:canvas.width/2,y:canvas.height/2};
window.addEventListener('mousemove', e=>{ pointer.x=e.clientX; pointer.y=e.clientY; });
window.addEventListener('touchmove', e=>{ pointer.x=e.touches[0].clientX; pointer.y=e.touches[0].clientY; }, {passive:true});

// ======= Настройки частиц =======
const PARTICLE_SPEED_Y = 0.03;    // базовая вертикальная скорость (медленнее)
const PARTICLE_SPEED_X = 0.15;    // горизонтальная разброс
const PARTICLE_LIFETIME = 6000;   // 6 секунд в воздухе
const MOUSE_FORCE = 0.1;          // сила отталкивания от мыши меньше
const MOUSE_RADIUS = 100;         // радиус действия мыши

// ======= Инициализация звуков =======
const grid=document.getElementById('soundGrid');
sounds.forEach((s,i)=>{
  const track=document.createElement('div');
  track.className='sound-track';
  track.innerHTML=`<input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
                   <button class="sound-button">${s.name[lang]}</button>`;
  grid.appendChild(track);

  const audio=new Audio(s.file); audio.loop=true; audio.volume=0.5;
  const slider=track.querySelector('.volume-slider'); const btn=track.querySelector('.sound-button');

  slider.addEventListener('input', e=>{ audio.volume=e.target.value; });
  btn.addEventListener('click', ()=>{
    if(audio.paused){ fadeIn(audio,500); btn.classList.add('active'); }
    else { fadeOut(audio,500); btn.classList.remove('active'); }
  });

  audioElements.push({audio, btn, slider, color:s.color});
});

// ======= Анимация частиц =======
function animate(){
  ctx.fillStyle='rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);

  audioElements.forEach(a=>{
    if(!a.audio.paused && Math.random()<0.3){
      particles.push({
        x: Math.random()*canvas.width,
        y: canvas.height-50,
        radius: a.audio.volume*12 + Math.random()*3,
        vy: - (PARTICLE_SPEED_Y + Math.random()*PARTICLE_SPEED_Y),
        vx: (Math.random()-0.5)*PARTICLE_SPEED_X,
        alpha: 0.1 + Math.random()*0.2,
        color: a.color,
        lifetime: 0
      });
    }
  });

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    // Реакция на мышь/касание
    const dx=p.x-pointer.x, dy=p.y-pointer.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<MOUSE_RADIUS){ 
      const force=(MOUSE_RADIUS-dist)/MOUSE_RADIUS*MOUSE_FORCE;
      p.vx+=(dx/dist)*force; 
      p.vy+=(dy/dist)*force*0.3;
    }

    p.x+=p.vx; p.y+=p.vy; p.alpha-=0.001;
    p.lifetime += 16; // приблизительно 60fps

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle=p.color.replace(/0\.2/, Math.max(p.alpha,0).toFixed(2));
    ctx.fill();

    if(p.alpha<=0 || p.lifetime>PARTICLE_LIFETIME){ particles.splice(i,1); }
  }

  audioElements.forEach(a=>{ a.btn.style.backgroundColor = (!a.audio.paused) ? a.color.replace('0.2','0.7') : 'rgba(255,255,255,0.3)'; });
  requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize', ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

// ======= Язык =======
const langBtn=document.getElementById('langBtn'), langDropdown=document.getElementById('langDropdown');
langBtn.addEventListener('click', ()=>{ langDropdown.style.display=langDropdown.style.display==='flex'?'none':'flex'; });
function setLang(l){
  lang=l;
  document.getElementById('title').innerText = lang==='en'?'BUCKET ASMR':lang==='ru'?'ВЕДРО АСМР':'ВІДРО АСМР';
  audioElements.forEach((a,i)=>{ a.btn.innerText = sounds[i].name[lang]; });
  langDropdown.style.display='none';
}
window.addEventListener('click', e=>{ if(!e.target.closest('.lang-select')) langDropdown.style.display='none'; });

// ======= Fade =======
function fadeIn(audio,duration=500){
  audio.volume=0; if(audio.paused) audio.play();
  const step=50, increment=step/duration*0.5;
  const interval=setInterval(()=>{ audio.volume=Math.min(audio.volume+increment,0.5); if(audio.volume>=0.5) clearInterval(interval); },step);
}
function fadeOut(audio,duration=500){
  const step=50, decrement=step/duration*0.5;
  const interval=setInterval(()=>{ audio.volume=Math.max(audio.volume-decrement,0); if(audio.volume<=0){ clearInterval(interval); audio.pause(); } },step);
}

// ======= Таймер =======
let timerSeconds=0, timerInterval=null, timerRunning=false;
const autoOffSelect=document.getElementById('autoOffSelect');
const timerBtn=document.getElementById('timerBtn');
const timerDisplay=document.getElementById('timerDisplay');

timerBtn.addEventListener('click', ()=>{
  if(!timerRunning){ timerSeconds=parseInt(autoOffSelect.value); startTimer(); } 
  else { stopTimer(); }
});
function startTimer(){
  timerRunning=true; timerBtn.innerText = lang==='en'?'Stop Timer':'Стоп таймер';
  updateTimerDisplay(); clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerSeconds--; updateTimerDisplay();
    if(timerSeconds<=0){ audioElements.forEach(a=>fadeOut(a.audio,1000)); stopTimer(); }
  },1000);
}
function stopTimer(){ timerRunning=false; timerSeconds=0; clearInterval(timerInterval); timerBtn.innerText=lang==='en'?'Start':'Старт'; updateTimerDisplay(); }
function updateTimerDisplay(){
  const hours=Math.floor(timerSeconds/3600);
  const minutes=Math.floor((timerSeconds%3600)/60);
  const seconds=timerSeconds%60;
  timerDisplay.innerText=(hours>0?String(hours).padStart(2,'0')+':':'')+String(minutes).padStart(2,'0')+':' + String(seconds).padStart(2,'0');
}

// ======= Random =======
let randomActive=false, randomTimer=null;
const randomBtn=document.getElementById('randomBtn'), randomInterval=document.getElementById('randomInterval');

randomBtn.addEventListener('click', ()=>{
  randomActive=!randomActive;
  randomBtn.innerText = randomActive?(lang==='en'?'Random ON':'Рандом ON'):(lang==='en'?'Random OFF':'Рандом OFF');
  if(randomActive){ triggerRandom(); scheduleRandom(); } else clearTimeout(randomTimer);
});
function scheduleRandom(){
  let intervalSec=parseInt(randomInterval.value);
  if(intervalSec===0) intervalSec=Math.floor(Math.random()*10)+5;
  randomTimer=setTimeout(()=>{ triggerRandom(); if(randomActive) scheduleRandom(); }, intervalSec*1000);
}
function triggerRandom(){
  const total=audioElements.length, calmCount=Math.floor(Math.random()*2)+1;
  const indices=[...Array(total).keys()]; shuffle(indices);
  const active=indices.slice(0,calmCount);

  audioElements.forEach((a,i)=>{ if(!active.includes(i)) fadeOut(a.audio,500); a.btn.classList.remove('active'); });
  active.forEach((i,idx)=>{ setTimeout(()=>{ fadeIn(audioElements[i].audio,500); audioElements[i].btn.classList.add('active'); }, idx*200); });
  const extraCount=Math.floor(Math.random()*(total-calmCount));
  const extra=indices.slice(calmCount, calmCount+extraCount);
  extra.forEach((i,idx)=>{ setTimeout(()=>{ fadeIn(audioElements[i].audio,500); audioElements[i].btn.classList.add('active'); }, 600+idx*200); });
}
function shuffle(array){ for(let i=array.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [array[i],array[j]]=[array[j],array[i]]; } }

</script>
</body>
</html>
