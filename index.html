<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #050505;
    transition: background 3s ease;
    font-family: Arial, sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.fancy-bg {
    background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%);
  }

  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  
  .container { 
    position: relative; z-index: 10; 
    display:flex; flex-direction: column; align-items:center; 
    padding:20px; height: 100vh; box-sizing: border-box; 
  }

  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:26px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  #helpBtn {
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
    width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
    font-weight: bold; font-size: 18px;
  }

  .lang-btn-ui {
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 8px 16px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold;
  }

  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { 
    padding:8px 14px; border:none; border-radius:12px; 
    background: rgba(255,255,255,0.2); color:white; cursor:pointer; 
    font-weight:bold; backdrop-filter: blur(5px); font-size: 13px;
    transition: all 0.3s ease;
  }
  
  #randomBtn { background: rgba(138, 43, 226, 0.4); border: 1px solid rgba(138, 43, 226, 0.5); min-width: 80px; }
  #repairBtn { background: rgba(255, 50, 50, 0.3); border: 1px solid rgba(255, 50, 50, 0.5); color: #ffcccc; }
  
  #sleepBtn { background: rgba(100, 150, 255, 0.1); border: 1px solid rgba(100, 150, 255, 0.2); color: #aabbff; }
  #sleepBtn.active { background: rgba(40, 50, 100, 0.6); color: #ccddee; border-color: rgba(100, 150, 255, 0.4); box-shadow: 0 0 15px rgba(0,0,50,0.5); }

  .sound-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
    gap: 15px; width: 100%; max-width: 600px; padding: 10px; overflow-y: auto; flex-grow: 1; z-index: 5;
  }

  .sound-button { 
    aspect-ratio: 1 / 1; border: none; border-radius: 20px; 
    background: rgba(255,255,255,0.05); color:rgba(255,255,255,0.2); font-weight:bold; 
    cursor:pointer; display:flex; flex-direction: column; justify-content:center; align-items:center; 
    backdrop-filter: blur(8px); transition: 0.3s; font-size: 11px; text-align: center;
    border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
    padding: 5px;
  }

  .mute-btn {
    position: absolute; top: 5px; right: 5px; width: 22px; height: 22px;
    background: rgba(255,255,255,0.1); border-radius: 50%; display: none;
    align-items: center; justify-content: center; font-size: 10px; color: white;
    z-index: 20; border: 1px solid rgba(255,255,255,0.2);
  }
  .sound-button.active .mute-btn { display: flex; }
  .mute-btn.muted { background: #ff5050; border-color: #ff5050; }

  .sound-button.loading { animation: pulse-load 1.2s infinite; color: #ffb400; }
  .sound-button.ready { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.1); }
  .sound-button.active { box-shadow: 0 0 20px rgba(255,255,255,0.2); color: white; }
  .sound-button.broken { border: 2px solid rgba(255, 50, 50, 0.6) !important; color: #ff5050; }

  @keyframes pulse-load {
    0%, 100% { background: rgba(255, 180, 0, 0.05); }
    50% { background: rgba(255, 180, 0, 0.2); }
  }

  .tile-vis {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden; display: none;
  }
  .tile-vis-bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; }
  .sound-button.active .tile-vis { display: block; }

  .custom-select-container { position: relative; }
  .select-trigger {
    padding: 8px 14px; border-radius: 12px; background: rgba(255, 255, 255, 0.2);
    color: white; cursor: pointer; font-weight: bold; font-size: 13px; min-width: 90px; text-align: center;
  }
  .custom-dropdown {
    display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(30, 30, 45, 0.95); border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px; flex-direction: column; z-index: 3000; overflow: hidden; min-width: 120px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(15px);
  }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button { padding: 12px; border: none; background: transparent; color: white; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; transition: opacity 1.5s ease; }
  canvas.hidden { opacity: 0; }
  
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(8px);
  }
  .modal-content {
    background: rgba(20, 20, 35, 0.95); border: 1px solid #ffb400;
    padding: 30px; border-radius: 24px; text-align: center; color: white; max-width: 85%;
    box-shadow: 0 0 30px rgba(255, 180, 0, 0.2); position: relative;
  }
  .modal-lang-pos { position: absolute; top: 15px; right: 15px; scale: 0.8; }
  .modal-btn {
    background:#ffb400; border:none; padding:12px 30px; border-radius:12px; 
    font-weight:bold; cursor:pointer; color:black; font-size: 16px; margin-top: 20px;
  }
  .hint-text { font-size: 13px; color: #aaa; margin-top: 15px; display: block; line-height: 1.4; }
</style>
</head>
<body class="fancy-bg">

<canvas id="stars"></canvas>
<canvas id="vis"></canvas>
<div class="overlay"></div>

<div id="welcomeModal" class="modal" style="display: flex;">
  <div class="modal-content">
    <div class="modal-lang-pos">
        <button class="lang-btn-ui lang-switcher-btn">EN</button>
    </div>
    <h2 style="color: #ffb400; margin-top: 0;">BUCKET ASMR</h2>
    <p id="welcomeText" style="line-height: 1.5;"></p>
    <span id="repairHint" class="hint-text"></span>
    <button class="modal-btn" id="closeWelcome">OK</button>
  </div>
</div>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <div id="helpBtn" onclick="showHelp()">?</div>
    <button id="langBtn" class="lang-btn-ui lang-switcher-btn">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn">Play</button>
    <button id="sleepBtn">Sleep: OFF</button>
    <button id="repairBtn">REPAIR</button>
    <div class="custom-select-container">
        <div class="select-trigger" id="speedTrigger">Fast</div>
        <div class="custom-dropdown" id="speedDropdown">
            <button onclick="setSpeed(11, 'fast')">Fast</button>
            <button onclick="setSpeed(24, 'medium')">Medium</button>
            <button onclick="setSpeed(46, 'slow')">Slow</button>
        </div>
    </div>
  </div>

  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
let audioCtx = null, globalAnalyser = null;
let currentSpeedValue = 11, langIdx = 0, randomActive = false, nextCycleTimeout = null;
let sleepMode = false, animationId = null;

const langOrder = ['en', 'uk', 'ru'];
let audioElements = [], particles = [], steamParticles = [];

let comet = null;
let supernova = null;
let fogParticles = Array.from({length: 5}, () => ({ x: Math.random()*innerWidth, y: Math.random()*innerHeight, r: 150+Math.random()*100, opacity: 0.03 + Math.random()*0.05, vx: Math.random()*0.2 - 0.1 }));

const sounds = [
  {file:'purplebrush.mp3', name:{en:'Purple Brush', ru:'Фиолетовая кисть', uk:'Фіолетовий пензель'}, color:'rgba(150,100,255,0.5)'},
  {file:'choko.mp3', name:{en:'Choco', ru:'Шоколад', uk:'Шоколад'}, color:'rgba(139,69,19,0.5)'},
  {file:'carrot.mp3', name:{en:'Carrot', ru:'Морковь', uk:'Морква'}, color:'rgba(255,140,0,0.5)'},
  {file:'oldphone.mp3', name:{en:'Old Phone', ru:'Телефон', uk:'Телефон'}, color:'rgba(50,50,50,0.5)'},
  {file:'greybrush.mp3', name:{en:'Grey Brush', ru:'Серая кисть', uk:'Сірий пензель'}, color:'rgba(140,140,140,0.5)'},
  {file:'pinksoftbrush.mp3', name:{en:'Soft Brush', ru:'Мягкая кисть', uk:'М’який пензель'}, color:'rgba(255,182,193,0.5)'},
  {file:'strawberry.mp3', name:{en:'Strawberry', ru:'Клубника', uk:'Полуниця'}, color:'rgba(255,105,180,0.5)'},
  {file:'wax.mp3', name:{en:'Wax', ru:'Воск', uk:'Віск'}, color:'rgba(255,165,0,0.5)'},
  {file:'wood.mp3', name:{en:'Wood', ru:'Дерево', uk:'Дерево'}, color:'rgba(255,255,0,0.5)'}
];

const uiTL = {
  en: { code: "EN", title: "BUCKET ASMR", play: "Play", pause: "Pause", repair: "REPAIR", welcome: "Press OK and Play to activate sounds.", repairHint: "Press REPAIR if sounds fail to load.", sleep: "Sleep", speeds: { slow: "Slow", medium: "Medium", fast: "Fast" } },
  ru: { code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", repair: "ЧИНИТЬ", welcome: "Нажмите OK и Играть для активации звуков.", repairHint: "Нажмите ЧИНИТЬ, если звуки не загрузились.", sleep: "Сон", speeds: { slow: "Медленно", medium: "Средне", fast: "Быстро" } },
  uk: { code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", repair: "ЛАГОДИТИ", welcome: "Натисніть OK та Грати для активації звуків.", repairHint: "Натисніть ЛАГОДИТИ, если звуки не завантажились.", sleep: "Сон", speeds: { slow: "Повільно", medium: "Середньо", fast: "Швидко" } }
};

async function smartLoad(state) {
    if (state.isLoaded) return;
    state.btn.classList.add('loading');
    const url = `https://raw.githubusercontent.com/bucketasmr/sounds/main/${state.fileName}?v=${Math.random().toString(36).substring(7)}`;
    try {
        state.audio.src = url; state.audio.load();
        const success = await new Promise((resolve) => {
            state.audio.oncanplaythrough = () => { state.btn.classList.remove('loading', 'broken'); state.btn.classList.add('ready'); state.isLoaded = true; resolve(true); };
            state.audio.onerror = () => resolve(false);
            setTimeout(() => resolve(false), 12000);
        });
        if (!success) handleLoadError(state);
    } catch (e) { handleLoadError(state); }
}

function handleLoadError(state) {
    state.isLoaded = false; state.btn.classList.remove('loading'); state.btn.classList.add('broken');
    if (state.retryTimer) clearTimeout(state.retryTimer);
    state.retryTimer = setTimeout(() => { if (!state.isLoaded) smartLoad(state); }, 1000);
}

function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAnalyser = audioCtx.createAnalyser();
  globalAnalyser.fftSize = 64;
  globalAnalyser.connect(audioCtx.destination);
  scheduleEvents();
}

function showHelp() { document.getElementById('welcomeModal').style.display = 'flex'; }

const grid = document.getElementById('soundGrid');
sounds.forEach((s) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  btn.innerHTML = `<div class="mute-btn">🔊</div><span>${s.name['en']}</span><div class="tile-vis"><div class="tile-vis-bar"></div></div>`;
  grid.appendChild(btn);
  
  const audio = new Audio();
  audio.loop = true; audio.crossOrigin = "anonymous"; audio.setAttribute('playsinline', '');
  
  const state = { 
    audio, btn, color: s.color, fileName: s.file, 
    visBar: btn.querySelector('.tile-vis-bar'), muteBtn: btn.querySelector('.mute-btn'),
    targetVol: 0, source: null, isLoaded: false, isMuted: false 
  };

  state.muteBtn.onclick = (e) => {
    e.stopPropagation();
    state.isMuted = !state.isMuted;
    state.muteBtn.classList.toggle('muted', state.isMuted);
    state.muteBtn.innerText = state.isMuted ? '🔇' : '🔊';
    if (state.gainNode) {
        state.gainNode.gain.setTargetAtTime(state.isMuted ? 0 : 0.6, audioCtx.currentTime, 0.2);
    }
  };

  btn.onclick = () => { 
    initAudioContext(); 
    if(!state.isLoaded) { smartLoad(state); return; }
    state.targetVol === 0 ? fadeIn(state) : fadeOut(state); 
  };
  audioElements.push(state);
});

function fadeIn(el) {
  if (!audioCtx) initAudioContext();
  el.audio.play().then(() => {
    if (!el.source) {
      el.source = audioCtx.createMediaElementSource(el.audio);
      el.gainNode = audioCtx.createGain();
      el.analyser = audioCtx.createAnalyser();
      el.analyser.fftSize = 32;
      el.tileDataArray = new Uint8Array(el.analyser.frequencyBinCount);
      el.source.connect(el.gainNode);
      el.gainNode.connect(el.analyser);
      el.analyser.connect(globalAnalyser);
    }
    el.btn.classList.add('active');
    el.targetVol = 0.6;
    el.gainNode.gain.setTargetAtTime(el.isMuted ? 0 : 0.6, audioCtx.currentTime, 0.4);
  }).catch(() => {});
}

function fadeOut(el) {
  el.btn.classList.remove('active');
  el.targetVol = 0;
  if(el.gainNode) el.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.8);
  setTimeout(() => { if(el.targetVol === 0) el.audio.pause(); }, 1000);
}

const sCan = document.getElementById('stars'), sCtx = sCan.getContext('2d');
const vCan = document.getElementById('vis'), vCtx = vCan.getContext('2d');
function res() { sCan.width = vCan.width = innerWidth; sCan.height = vCan.height = innerHeight; }
window.onresize = res; res();
const starsArr = Array.from({length:80}, () => ({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.5, a:Math.random(), t:Math.random()*0.01 }));

function triggerComet() { 
    if (comet || sleepMode) return; 
    const side = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    const speed = 6 + Math.random() * 10;
    if (side === 0) { x = -100; y = Math.random() * innerHeight; vx = speed; vy = (Math.random() - 0.5) * speed; }
    else if (side === 1) { x = innerWidth + 100; y = Math.random() * innerHeight; vx = -speed; vy = (Math.random() - 0.5) * speed; }
    else if (side === 2) { x = Math.random() * innerWidth; y = -100; vx = (Math.random() - 0.5) * speed; vy = speed; }
    else { x = Math.random() * innerWidth; y = innerHeight + 100; vx = (Math.random() - 0.5) * speed; vy = -speed; }
    comet = { x, y, vx, vy, len: 150 + Math.random() * 150, opacity: 0.8 }; 
}

function triggerSupernova() { if (supernova || sleepMode) return; supernova = { x: Math.random()*innerWidth, y: Math.random()*innerHeight, r: 1, maxR: 40 + Math.random()*40, opacity: 0, stage: 'growing' }; }
function triggerAurora() {
    if (sleepMode) return;
    const colors = ['radial-gradient(ellipse at bottom, #051510 0%, #0a0a1f 100%)', 'radial-gradient(ellipse at bottom, #100515 0%, #0a0a1f 100%)', 'radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%)'];
    document.body.style.background = colors[Math.floor(Math.random()*colors.length)];
}
function scheduleEvents() {
    setInterval(() => { if(Math.random() < 0.25) triggerComet(); }, 12000);
    setInterval(() => { if(Math.random() < 0.1) triggerSupernova(); }, 20000);
    setInterval(() => { if(Math.random() < 0.3) triggerAurora(); }, 30000);
}

function animate(){
  if (!sleepMode) {
    sCtx.clearRect(0,0,innerWidth,innerHeight);
    starsArr.forEach(s=>{ s.a+=s.t; if(s.a>1||s.a<0.1) s.t*=-1; sCtx.beginPath(); sCtx.arc(s.x,s.y,s.r,0,Math.PI*2); sCtx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`; sCtx.fill(); });
    vCtx.clearRect(0,0,innerWidth,innerHeight);

    fogParticles.forEach(f => {
        f.x += f.vx; if (f.x > innerWidth + f.r) f.x = -f.r; if (f.x < -f.r) f.x = innerWidth + f.r;
        let g = vCtx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
        g.addColorStop(0, `rgba(255, 255, 255, ${f.opacity})`); g.addColorStop(1, 'rgba(255, 255, 255, 0)');
        vCtx.fillStyle = g; vCtx.fillRect(f.x - f.r, f.y - f.r, f.r * 2, f.r * 2);
    });

    if (comet) {
        vCtx.beginPath(); 
        let g = vCtx.createLinearGradient(comet.x, comet.y, comet.x - (comet.vx * 10), comet.y - (comet.vy * 10));
        g.addColorStop(0, `rgba(255, 220, 150, ${comet.opacity})`); 
        g.addColorStop(1, 'rgba(255, 255, 255, 0)');
        vCtx.strokeStyle = g; vCtx.lineWidth = 2; 
        vCtx.moveTo(comet.x, comet.y);
        vCtx.lineTo(comet.x - (comet.vx * (comet.len/15)), comet.y - (comet.vy * (comet.len/15))); 
        vCtx.stroke();
        comet.x += comet.vx; comet.y += comet.vy;
        if (comet.x > innerWidth + 500 || comet.x < -500 || comet.y > innerHeight + 500 || comet.y < -500) comet = null;
    }

    if (supernova) {
        vCtx.beginPath(); let g = vCtx.createRadialGradient(supernova.x, supernova.y, 0, supernova.x, supernova.y, supernova.r);
        g.addColorStop(0, `rgba(255, 255, 255, ${supernova.opacity})`); g.addColorStop(0.2, `rgba(255, 200, 50, ${supernova.opacity*0.5})`); g.addColorStop(1, 'rgba(255, 255, 255, 0)');
        vCtx.fillStyle = g; vCtx.arc(supernova.x, supernova.y, supernova.r, 0, Math.PI*2); vCtx.fill();
        if (supernova.stage === 'growing') { supernova.r += 0.5; supernova.opacity += 0.02; if (supernova.opacity >= 0.8) supernova.stage = 'fading'; }
        else { supernova.r += 0.2; supernova.opacity -= 0.01; if (supernova.opacity <= 0) supernova = null; }
    }
  }

  audioElements.forEach(el => {
    if(el.analyser && el.btn.classList.contains('active')) {
        el.analyser.getByteFrequencyData(el.tileDataArray);
        let vol = 0; for(let i=0; i<el.tileDataArray.length; i++) vol += el.tileDataArray[i];
        vol /= el.tileDataArray.length;
        
        if (sleepMode) {
          el.visBar.style.width = '0%';
          el.btn.style.backgroundColor = 'rgba(255,255,255,0.2)';
        } else {
          el.visBar.style.width = `${Math.min(100, (vol/150)*100)}%`;
          el.btn.style.backgroundColor = el.color.replace('0.5', (0.15 + (vol/255)*0.6).toFixed(2));
          
          if(Math.random() < 0.08) {
              steamParticles.push({ x: Math.random() * innerWidth, y: innerHeight + 50, r: 40 + Math.random() * 60, opacity: 0.15 + (vol / 255) * 0.2, speed: 0.3 + Math.random() * 0.5, drift: Math.random() * 0.4 - 0.2, color: el.color });
          }
          if(Math.random() < (0.05 + vol/255*0.4)) {
              particles.push({ x: Math.random()*innerWidth, y: innerHeight+10, r: ((vol/50)+5)*2, s: (0.5 + (vol/100))/3, al: 0.9, c: el.color });
          }
        }
    } else if(el.isLoaded) { el.btn.style.backgroundColor = 'rgba(255,255,255,0.15)'; el.visBar.style.width = '0%'; }
  });

  if (!sleepMode) {
    for (let i = steamParticles.length - 1; i >= 0; i--) {
      const s = steamParticles[i]; s.y -= s.speed; s.x += Math.sin(s.y * 0.01) * s.drift; s.opacity -= 0.0005;
      let grad = vCtx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
      let c = s.color.split(',').slice(0,3).join(',');
      grad.addColorStop(0, `${c}, ${s.opacity})`); grad.addColorStop(1, `${c}, 0)`);
      vCtx.fillStyle = grad; vCtx.beginPath(); vCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); vCtx.fill();
      if(s.opacity <= 0 || s.y < -s.r) steamParticles.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.y -= p.s; p.al -= 0.001;
      vCtx.beginPath(); vCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      vCtx.fillStyle = `${p.c.split(',').slice(0,3).join(',')},${p.al})`; vCtx.fill();
      if(p.al <= 0) particles.splice(i, 1);
    }
  }
  animationId = requestAnimationFrame(animate);
}
animationId = requestAnimationFrame(animate);

function toggleSleep() {
    sleepMode = !sleepMode;
    const btn = document.getElementById('sleepBtn');
    const canvases = [document.getElementById('stars'), document.getElementById('vis')];
    
    if (sleepMode) {
        canvases.forEach(c => c.classList.add('hidden'));
        document.body.classList.remove('fancy-bg');
        document.body.style.background = '#000';
        particles = [];
        steamParticles = [];
    } else {
        canvases.forEach(c => c.classList.remove('hidden'));
        document.body.classList.add('fancy-bg');
    }
    updateUI();
}

function runRandom() { 
  if(!randomActive) return; 
  let readySounds = audioElements.filter(el => el.isLoaded);
  if (readySounds.length === 0) { nextCycleTimeout = setTimeout(runRandom, 1000); return; }
  let count = Math.random() < 0.25 ? Math.min(readySounds.length, Math.floor(Math.random() * 2) + 3) : Math.min(readySounds.length, Math.floor(Math.random() * 2) + 1);
  let toPlay = readySounds.sort(() => 0.5 - Math.random()).slice(0, count);
  const hasAudible = toPlay.some(el => !el.isMuted);
  if (!hasAudible) {
    const audibleOptions = readySounds.filter(el => !el.isMuted);
    if (audibleOptions.length > 0) {
      const randomAudible = audibleOptions[Math.floor(Math.random() * audibleOptions.length)];
      if (!toPlay.includes(randomAudible)) toPlay.push(randomAudible);
    }
  }
  audioElements.forEach(el => toPlay.includes(el) ? fadeIn(el) : fadeOut(el));
  nextCycleTimeout = setTimeout(runRandom, currentSpeedValue * 1000); 
}

let currentSpeedKey = 'fast';
function setSpeed(v, key) { 
    currentSpeedValue = v; currentSpeedKey = key;
    updateUI();
    document.getElementById('speedDropdown').classList.remove('open'); 
    if(randomActive){ clearTimeout(nextCycleTimeout); runRandom(); } 
}

document.getElementById('sleepBtn').onclick = toggleSleep;
document.getElementById('speedTrigger').onclick = (e) => { e.stopPropagation(); document.getElementById('speedDropdown').classList.toggle('open'); };
document.querySelectorAll('.lang-switcher-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); langIdx = (langIdx + 1) % 3; updateUI(); };
});
document.getElementById('randomBtn').onclick = () => { initAudioContext(); randomActive = !randomActive; if(randomActive) runRandom(); else { clearTimeout(nextCycleTimeout); audioElements.forEach(fadeOut); } updateUI(); };
document.getElementById('repairBtn').onclick = () => location.reload();
document.getElementById('closeWelcome').onclick = () => { 
  initAudioContext(); document.getElementById('welcomeModal').style.display='none'; 
  audioElements.forEach(state => smartLoad(state));
};

function updateUI(){
  const t=uiTL[langOrder[langIdx]];
  document.getElementById('title').innerText=t.title;
  document.querySelectorAll('.lang-switcher-btn').forEach(btn => btn.innerText = t.code);
  document.getElementById('randomBtn').innerText=randomActive?t.pause:t.play;
  document.getElementById('repairBtn').innerText=t.repair;
  document.getElementById('welcomeText').innerText=t.welcome;
  document.getElementById('repairHint').innerText=t.repairHint;
  document.getElementById('speedTrigger').innerText=t.speeds[currentSpeedKey];
  document.getElementById('sleepBtn').innerText = `${t.sleep}: ${sleepMode ? 'ON' : 'OFF'}`;
  document.getElementById('sleepBtn').classList.toggle('active', sleepMode);
  const speedBtns = document.querySelectorAll('#speedDropdown button');
  speedBtns[0].innerText = t.speeds.fast; speedBtns[1].innerText = t.speeds.medium; speedBtns[2].innerText = t.speeds.slow;
  audioElements.forEach((el,i)=>el.btn.querySelector('span').innerText=sounds[i].name[langOrder[langIdx]]);
}
window.onclick=()=>document.getElementById('speedDropdown').classList.remove('open');
updateUI();
</script>
